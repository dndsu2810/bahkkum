<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모각공 어드민</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fire:#FE5F3C;--fire2:#FF9A2E;--fire-soft:rgba(254,95,60,.1);--fire-border:rgba(254,95,60,.25);
  --bg:#F7F4F2;--white:#FFFFFF;
  --gray-100:#F1EDE9;--gray-200:#E4DDD7;--gray-400:#A89D95;--gray-600:#6B5F57;--gray-800:#2C2018;
  --green:#22A55A;--green-soft:rgba(34,165,90,.1);
  --red:#E84545;--red-soft:rgba(232,69,69,.1);
  --blue:#3B82F6;--blue-soft:rgba(59,130,246,.1);
  --purple:#8B5CF6;--purple-soft:rgba(139,92,246,.1);
}
body{background:var(--bg);color:var(--gray-800);font-family:'Noto Sans KR',sans-serif;min-height:100vh}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1A0E08,#2C1810)}
.login-box{background:var(--white);border-radius:24px;padding:40px 36px;width:min(400px,96vw);box-shadow:0 32px 80px rgba(0,0,0,.25);text-align:center}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:900;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--gray-400);margin-bottom:28px}
.login-inp{width:100%;border:2px solid var(--gray-200);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:16px;font-weight:700;outline:none;text-align:center;letter-spacing:6px;transition:border-color .2s}
.login-inp:focus{border-color:var(--fire)}
.login-btn{width:100%;margin-top:12px;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer}
.login-err{font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}

/* ── LAYOUT ── */
.app{display:none}
.app.visible{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--white);border-bottom:1.5px solid var(--gray-200);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.hdr-brand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:900}
.hdr-brand span{color:var(--fire)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-date{font-size:12px;color:var(--gray-400)}
.hdr-kiosk{display:flex;align-items:center;gap:4px;background:var(--fire-soft);border:1px solid var(--fire-border);color:var(--fire);font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;text-decoration:none}
.logout-btn{background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-600);font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer}
.main{flex:1;padding:20px 24px;max-width:1100px;margin:0 auto;width:100%}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--white);border-radius:14px;padding:5px;border:1.5px solid var(--gray-200);width:fit-content;flex-wrap:wrap}
.tab{font-family:inherit;font-size:13px;font-weight:700;padding:8px 16px;border-radius:10px;border:none;background:transparent;color:var(--gray-400);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--fire);color:#fff;box-shadow:0 2px 12px rgba(254,95,60,.35)}

/* ── CARD ── */
.card{background:var(--white);border-radius:16px;border:1.5px solid var(--gray-200);margin-bottom:16px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1.5px solid var(--gray-100);gap:10px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:900}
.card-body{padding:16px 20px}

/* ── BUTTONS ── */
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;border:none;transition:all .15s}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{opacity:.9}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.9}
.btn-gray{background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200)}
.btn-gray:hover{background:var(--gray-200)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.inp{width:100%;border:1.5px solid var(--gray-200);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px;outline:none;background:var(--white);transition:border-color .2s}
.inp:focus{border-color:var(--fire)}
.sel{border:1.5px solid var(--gray-200);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:13px;outline:none;background:var(--white);cursor:pointer}
.refresh-btn{padding:7px 14px;border-radius:10px;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-600);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.refresh-btn:hover{border-color:var(--fire-border);color:var(--fire)}

/* ── STUDENT SELECTOR (미션 탭) ── */
.student-selector{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;padding:12px 0 4px}
.stu-sel-btn{font-family:inherit;font-size:14px;font-weight:900;padding:12px 6px 10px;border-radius:12px;border:2px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.stu-sel-btn .sel-av{width:36px;height:36px;border-radius:50%;background:var(--gray-100);border:2px solid var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--gray-400)}
.stu-sel-btn .sel-status{font-size:10px;font-weight:700;color:var(--gray-400)}
.stu-sel-btn:hover{border-color:var(--fire-border);background:var(--fire-soft)}
.stu-sel-btn.active{background:var(--fire-soft);border-color:var(--fire)}
.stu-sel-btn.active .sel-av{background:var(--fire);border-color:var(--fire);color:#fff}
.stu-sel-btn.has-missions .sel-av{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.stu-sel-btn.has-missions .sel-status{color:var(--green)}
.stu-sel-btn.active.has-missions .sel-av{background:var(--green);border-color:var(--green);color:#fff}

/* ── 카테고리 필터 ── */
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-btn{font-family:inherit;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;transition:all .15s}
.cat-btn.active{border-color:var(--fire);background:var(--fire-soft);color:var(--fire)}
.cat-btn.cat-초등영어.active{border-color:#3B82F6;background:var(--blue-soft);color:#3B82F6}
.cat-btn.cat-중고등영어.active{border-color:#8B5CF6;background:var(--purple-soft);color:#8B5CF6}
.cat-btn.cat-초등수학.active{border-color:#22A55A;background:var(--green-soft);color:#22A55A}
.cat-btn.cat-중고등수학.active{border-color:#FE5F3C;background:var(--fire-soft);color:#FE5F3C}

/* ── 카테고리 섹션 ── */
.cat-section{margin-bottom:20px}
.cat-section-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:12px 12px 0 0;font-size:14px;font-weight:900;cursor:pointer}
.cat-section-head.cat-초등영어{background:var(--blue-soft);color:#1D4ED8;border:1.5px solid rgba(59,130,246,.25)}
.cat-section-head.cat-중고등영어{background:var(--purple-soft);color:#6D28D9;border:1.5px solid rgba(139,92,246,.25)}
.cat-section-head.cat-초등수학{background:var(--green-soft);color:#166534;border:1.5px solid rgba(34,165,90,.25)}
.cat-section-head.cat-중고등수학{background:var(--fire-soft);color:#C2410C;border:1.5px solid rgba(254,95,60,.25)}
.cat-section-body{background:var(--white);border:1.5px solid var(--gray-200);border-top:none;border-radius:0 0 12px 12px;padding:14px}

/* ── 클래스 그룹 ── */
.class-group{margin-bottom:12px}
.class-label{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.class-label-del{font-size:10px;cursor:pointer;color:var(--red);opacity:.6}
.class-label-del:hover{opacity:1}
.student-chips{display:flex;flex-wrap:wrap;gap:6px}
.stu-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;background:var(--gray-100);border:1.5px solid var(--gray-200);color:var(--gray-800)}
.stu-chip.kiosk{background:rgba(34,165,90,.08);border-color:rgba(34,165,90,.3);color:#166534}
.stu-chip-del{font-size:12px;color:var(--gray-400);cursor:pointer;line-height:1}
.stu-chip-del:hover{color:var(--red)}

/* ── 학생 추가 폼 ── */
.add-stu-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px dashed var(--gray-200)}

/* ── MISSION EDITOR ── */
.mission-editor{background:var(--white);border-radius:20px;border:1.5px solid var(--gray-200);overflow:hidden;margin-bottom:20px}
.editor-head{padding:16px 20px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.editor-title{font-size:15px;font-weight:900}
.editor-body{padding:20px}
.no-student{text-align:center;padding:32px;color:var(--gray-400);font-size:14px}
.selected-student-name{font-size:18px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fire-tag{font-size:12px;font-weight:700;background:var(--fire-soft);border:1px solid var(--fire-border);color:var(--fire);border-radius:20px;padding:3px 10px}

/* ── MISSION ROWS ── */
.mission-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.mission-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--gray-100);border-radius:10px;border:1.5px solid transparent}
.mission-row:hover{border-color:var(--gray-200);background:var(--white)}
.mission-num{font-size:10px;font-weight:900;color:var(--gray-400);width:20px;flex-shrink:0;text-align:center}
.mission-text-input{flex:2;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--gray-800);outline:none;min-width:80px}
.mission-hint-input{flex:1;border:1px solid var(--gray-200);border-radius:8px;padding:5px 9px;font-family:inherit;font-size:12px;color:var(--gray-600);outline:none;background:var(--white);min-width:60px}
.mission-hint-input:focus{border-color:var(--fire-border)}
.mission-del{width:26px;height:26px;border-radius:7px;border:none;background:var(--red-soft);color:var(--red);font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.add-mission-row{display:flex;gap:8px}
.add-mission-inp{flex:1;border:2px dashed var(--gray-200);border-radius:10px;padding:10px 13px;font-family:inherit;font-size:14px;outline:none;background:var(--white);transition:border-color .2s}
.add-mission-inp:focus{border-color:var(--fire-border)}
.add-mission-btn{padding:10px 16px;border-radius:10px;border:none;background:var(--fire-soft);color:var(--fire);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.add-mission-btn:hover{background:var(--fire);color:#fff}
.save-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--gray-100);border-top:1.5px solid var(--gray-200);gap:10px;flex-wrap:wrap;margin:0 -20px -20px}
.save-hint{font-size:12px;color:var(--gray-400)}
.save-btn{padding:10px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(254,95,60,.3)}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.save-status{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.save-status.ok{background:var(--green-soft);color:var(--green)}
.save-status.err{background:var(--red-soft);color:var(--red)}

/* ── 프리셋 ── */
.preset-section{margin-bottom:14px}
.preset-label{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.08em;margin-bottom:8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.preset-edit-btn{font-family:inherit;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-400);cursor:pointer}
.preset-chips{display:flex;gap:6px;flex-wrap:wrap}
.preset-chip{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer}
.preset-chip:hover{border-color:var(--fire-border);color:var(--fire);background:var(--fire-soft)}
.recent-section{margin-bottom:12px}
.recent-chips{display:flex;gap:6px;flex-wrap:wrap}
.recent-chip{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(59,130,246,.25);background:rgba(59,130,246,.06);color:var(--blue);cursor:pointer}
.preset-editor{display:none;background:var(--gray-100);border-radius:12px;padding:13px;margin-top:8px;border:1.5px solid var(--gray-200)}
.preset-editor.open{display:block}
.preset-edit-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.preset-edit-row{display:flex;align-items:center;gap:7px}
.preset-edit-inp{flex:1;border:1.5px solid var(--gray-200);border-radius:9px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none;background:var(--white)}
.preset-edit-inp:focus{border-color:var(--fire)}
.preset-add-row{display:flex;gap:7px;padding-top:8px;border-top:1px solid var(--gray-200)}
.preset-editor-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-200)}

/* ── OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.overview-card{background:var(--white);border-radius:14px;border:1.5px solid var(--gray-200);padding:16px}
.ov-stu-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ov-av{width:36px;height:36px;border-radius:50%;background:var(--fire-soft);border:2px solid var(--fire-border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--fire);flex-shrink:0}
.ov-name{font-size:14px;font-weight:900}
.ov-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
.ov-missions{display:flex;flex-direction:column;gap:4px}
.ov-mission-item{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--gray-600)}
.ov-mission-item::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gray-200);flex-shrink:0;margin-top:5px}
.ov-hint{font-size:11px;color:var(--gray-400);margin-top:1px}
.no-missions-msg{font-size:11px;color:var(--gray-400);text-align:center;padding:10px 0}

/* ── LINK TAB ── */
.link-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:14px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.link-stu-name{font-size:14px;font-weight:900;min-width:80px}
.link-stu-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
.link-url{font-size:11px;color:var(--gray-400);background:var(--gray-100);border-radius:8px;padding:7px 11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.link-copy-btn{padding:8px 14px;border-radius:10px;border:1.5px solid var(--fire-border);background:var(--fire-soft);color:var(--fire);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.link-copy-btn.copied{background:var(--green-soft);border-color:var(--green);color:var(--green)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--gray-800);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:9999;animation:toast-in .3s ease;pointer-events:none}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){.main{padding:14px}.hdr{padding:0 14px}.link-card{flex-wrap:wrap}.link-url{flex:100%;order:3}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">🔥</div>
    <div class="login-title">모각공 어드민</div>
    <div class="login-sub">선생님 전용 관리 화면이에요</div>
    <input class="login-inp" type="password" id="pw-inp" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err">비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <header class="hdr">
    <div class="hdr-brand">🔥 모각공 <span>어드민</span></div>
    <div class="hdr-right">
      <span class="hdr-date" id="hdr-date"></span>
      <a class="hdr-kiosk" href="https://bakuum-kiosk.pages.dev" target="_blank">🖥️ 키오스크</a>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('missions',this)">📋 미션 입력</button>
      <button class="tab" onclick="switchTab('overview',this)">👀 현황 보기</button>
      <button class="tab" onclick="switchTab('students',this)">🎓 학생 관리</button>
      <button class="tab" onclick="switchTab('links',this)">🔗 링크 생성</button>
    </div>

    <!-- ── 미션 입력 ── -->
    <div id="tab-missions">
      <div class="mission-editor">
        <div class="editor-head">
          <div class="editor-title">📋 오늘의 미션 입력</div>
        </div>
        <div style="padding:0 20px">
          <div class="cat-filter" id="mission-cat-filter"></div>
          <div class="student-selector" id="mission-student-selector">
            <span style="font-size:12px;color:var(--gray-400)">로딩 중...</span>
          </div>
        </div>
        <div class="editor-body" id="mission-editor-body">
          <div class="no-student">위에서 학생을 선택해주세요 👆</div>
        </div>
      </div>
    </div>

    <!-- ── 현황 보기 ── -->
    <div id="tab-overview" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:900">📋 오늘의 미션 현황</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="cat-filter" id="overview-cat-filter" style="margin-bottom:0"></div>
          <button class="refresh-btn" onclick="loadOverview()">↻ 새로고침</button>
        </div>
      </div>
      <div class="overview-grid" id="overview-grid"><div style="color:var(--gray-400);font-size:13px">로딩 중...</div></div>
    </div>

    <!-- ── 학생 관리 ── -->
    <div id="tab-students" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:900">🎓 학생 관리</div>
        <button class="refresh-btn" onclick="loadStudents()">↻ 새로고침</button>
      </div>
      <div id="student-categories"></div>
    </div>

    <!-- ── 링크 생성 ── -->
    <div id="tab-links" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:900">🔗 학생별 링크</div>
        <button class="refresh-btn" onclick="loadLinks()">↻ 새로고침</button>
      </div>
      <div style="background:var(--fire-soft);border:1.5px solid var(--fire-border);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--fire);font-weight:600;margin-bottom:14px">
        🔗 링크를 카카오톡으로 학생에게 보내면 본인 이름으로 모각공이 열려요!
      </div>
      <div id="link-list"><div style="color:var(--gray-400);font-size:13px">로딩 중...</div></div>
    </div>
  </main>
</div>

<script>
// ── 설정 ─────────────────────────────────────────────────────────────────────
const KIOSK = 'https://bakuum-kiosk.pages.dev';
const MOGAKGONG_URL = 'https://mogakgong.pages.dev/index.html';
const CATS = ['초등영어','중고등영어','초등수학','중고등수학'];
const KIOSK_CATS = ['초등수학','중고등수학']; // 키오스크 학생이 들어갈 카테고리

// ── 상태 ─────────────────────────────────────────────────────────────────────
let PW = '';
let KIOSK_STUDENTS = [];
// MOGAK_DATA 구조: { 카테고리: { classes:[...], students:[{name,class}] } }
let MOGAK_DATA = {};
let STUDENTS = [];       // 전체 (미션 편집용)
let ALL_MISSIONS = {};
let selectedStudent = null;
let currentMissions = [];
let currentTab = 'missions';
let missionCatFilter = '전체';
let overviewCatFilter = '전체';

// ── 로그인 ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pw-inp').value.trim();
  if (!pw) return;
  try {
    const res = await fetch(KIOSK + '/api/admin/auth', { headers: {'X-Admin-Password': pw} });
    const d = await res.json();
    if (d.success) { PW = pw; sessionStorage.setItem('mogak_admin_pw', pw); showApp(); }
    else showLoginErr();
  } catch { showLoginErr(); }
}
function showLoginErr() {
  document.getElementById('login-err').classList.add('show');
  document.getElementById('pw-inp').style.borderColor = 'var(--red)';
}
function doLogout() {
  PW = ''; sessionStorage.removeItem('mogak_admin_pw');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('pw-inp').value = '';
}
function showApp() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const d = new Date();
  document.getElementById('hdr-date').textContent = d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
  initApp();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { headers: {'X-Admin-Password': PW} };
  if (method !== 'GET') { opts.method = method; opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(KIOSK + path, opts);
  return res.json();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initApp() {
  await loadStudents();
  await loadTodayMissions();
  renderMissionCatFilter();
  renderMissionStudentSelector();
}

// ── 학생 로드 ─────────────────────────────────────────────────────────────────
async function loadMogakData() {
  try {
    const res = await fetch(KIOSK + '/api/config');
    const cfg = await res.json();
    const saved = cfg.mogak_data || {};
    // 각 카테고리 초기화
    MOGAK_DATA = {};
    CATS.forEach(cat => {
      MOGAK_DATA[cat] = {
        classes: saved[cat]?.classes || [],
        students: saved[cat]?.students || []
      };
    });
  } catch {
    MOGAK_DATA = {};
    CATS.forEach(cat => { MOGAK_DATA[cat] = {classes:[], students:[]}; });
  }
}
async function saveMogakData() {
  try {
    const res = await fetch(KIOSK + '/api/config');
    const cfg = await res.json();
    cfg.mogak_data = MOGAK_DATA;
    await api('/api/admin/config', 'POST', cfg);
  } catch(e) { console.error(e); }
}

async function loadStudents() {
  try {
    const d = await api('/api/students');
    if (d.success) KIOSK_STUDENTS = d.students;
  } catch { KIOSK_STUDENTS = []; }
  await loadMogakData();

  // 전체 학생 목록 합치기
  const allNames = new Set();
  STUDENTS = [];
  KIOSK_STUDENTS.forEach(s => { allNames.add(s.name); STUDENTS.push({...s, _kiosk:true}); });
  CATS.forEach(cat => {
    (MOGAK_DATA[cat]?.students || []).forEach(s => {
      if (!allNames.has(s.name)) { allNames.add(s.name); STUDENTS.push({id:'mogak_'+s.name, name:s.name, points:null, _mogakOnly:true, _cat:cat, _class:s.class}); }
    });
  });

  renderStudentCategories();
  renderMissionStudentSelector();
}

// ── 학생 관리 화면 ────────────────────────────────────────────────────────────
const CAT_COLORS = {'초등영어':'cat-초등영어','중고등영어':'cat-중고등영어','초등수학':'cat-초등수학','중고등수학':'cat-중고등수학'};
const CAT_ICONS = {'초등영어':'📘','중고등영어':'📗','초등수학':'📐','중고등수학':'📏'};

function renderStudentCategories() {
  const el = document.getElementById('student-categories');
  if (!el) return;
  el.innerHTML = CATS.map(cat => renderCatSection(cat)).join('');
}

function renderCatSection(cat) {
  const data = MOGAK_DATA[cat] || {classes:[], students:[]};
  const isKioskCat = KIOSK_CATS.includes(cat);
  const colorCls = CAT_COLORS[cat];
  const icon = CAT_ICONS[cat];

  // 키오스크 학생 (해당 카테고리면 표시)
  const kioskStudents = isKioskCat ? KIOSK_STUDENTS : [];

  // 클래스별 모각공 학생
  const classGroups = {};
  data.students.forEach(s => {
    const cls = s.class || '미분류';
    if (!classGroups[cls]) classGroups[cls] = [];
    classGroups[cls].push(s.name);
  });

  // 클래스 없는 학생
  const noClass = data.students.filter(s => !s.class || s.class === '미분류');

  let chipsHTML = '';

  // 클래스별 렌더
  data.classes.forEach(cls => {
    const stuList = classGroups[cls] || [];
    chipsHTML += `<div class="class-group">
      <div class="class-label">
        ${escHtml(cls)}
        <span class="class-label-del" onclick="deleteClass('${escHtml(cat)}','${escHtml(cls)}')">✕ 클래스 삭제</span>
      </div>
      <div class="student-chips">
        ${stuList.map(n => `<div class="stu-chip">
          ${escHtml(n)}
          <span class="stu-chip-del" onclick="deleteMogakStudent('${escHtml(cat)}','${escHtml(n)}')">✕</span>
        </div>`).join('')}
        ${!stuList.length ? '<span style="font-size:12px;color:var(--gray-400)">학생 없음</span>' : ''}
      </div>
    </div>`;
  });

  // 미분류 학생
  if (noClass.length) {
    chipsHTML += `<div class="class-group">
      <div class="class-label">미분류</div>
      <div class="student-chips">
        ${noClass.map(s => `<div class="stu-chip">
          ${escHtml(s.name)}
          <span class="stu-chip-del" onclick="deleteMogakStudent('${escHtml(cat)}','${escHtml(s.name)}')">✕</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // 키오스크 학생
  if (kioskStudents.length) {
    chipsHTML += `<div class="class-group">
      <div class="class-label">🖥️ 키오스크 연동 (수정 불가)</div>
      <div class="student-chips">
        ${kioskStudents.map(s => `<div class="stu-chip kiosk">🖥️ ${escHtml(s.name)} <span style="font-size:11px;color:#16A34A">🏅${s.points}P</span></div>`).join('')}
      </div>
    </div>`;
  }

  if (!chipsHTML) chipsHTML = '<div style="font-size:13px;color:var(--gray-400);padding:4px 0">학생이 없어요. 아래에서 추가해보세요!</div>';

  // 클래스 목록 옵션
  const classOptions = data.classes.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');

  return `<div class="cat-section">
    <div class="cat-section-head ${colorCls}">${icon} ${cat}
      <span style="font-size:12px;font-weight:600;opacity:.7">${data.students.length + kioskStudents.length}명</span>
    </div>
    <div class="cat-section-body">
      ${chipsHTML}
      <!-- 클래스 추가 -->
      <div class="add-stu-form">
        <input class="inp" id="new-class-${cat}" placeholder="새 클래스 이름 (예: A반, 월수반)" style="flex:1;min-width:100px"/>
        <button class="btn btn-gray btn-sm" onclick="addClass('${escHtml(cat)}')">+ 클래스 추가</button>
      </div>
      <!-- 학생 추가 -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <input class="inp" id="new-stu-name-${cat}" placeholder="학생 이름" style="flex:1;min-width:80px"/>
        <select class="sel" id="new-stu-class-${cat}" style="min-width:90px">
          <option value="">클래스 없음</option>
          ${classOptions}
        </select>
        <button class="btn btn-blue btn-sm" onclick="addMogakStudent('${escHtml(cat)}')">+ 학생 추가</button>
      </div>
    </div>
  </div>`;
}

// ── 클래스 추가/삭제 ──────────────────────────────────────────────────────────
async function addClass(cat) {
  const inp = document.getElementById('new-class-' + cat);
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  if (!MOGAK_DATA[cat]) MOGAK_DATA[cat] = {classes:[], students:[]};
  if (MOGAK_DATA[cat].classes.includes(name)) { toast('⚠️ 이미 있는 클래스예요'); return; }
  MOGAK_DATA[cat].classes.push(name);
  inp.value = '';
  await saveMogakData();
  renderStudentCategories();
  toast('✅ ' + name + ' 클래스 추가됨!');
}
async function deleteClass(cat, cls) {
  if (!confirm(cls + ' 클래스를 삭제할까요? (학생은 미분류로 이동돼요)')) return;
  MOGAK_DATA[cat].classes = MOGAK_DATA[cat].classes.filter(c => c !== cls);
  // 해당 클래스 학생들 미분류로
  MOGAK_DATA[cat].students = MOGAK_DATA[cat].students.map(s => s.class === cls ? {...s, class:''} : s);
  await saveMogakData();
  renderStudentCategories();
  toast('🗑️ ' + cls + ' 삭제됨');
}

// ── 학생 추가/삭제 ────────────────────────────────────────────────────────────
async function addMogakStudent(cat) {
  const nameInp = document.getElementById('new-stu-name-' + cat);
  const classInp = document.getElementById('new-stu-class-' + cat);
  if (!nameInp) return;
  const name = nameInp.value.trim();
  if (!name) { nameInp.focus(); return; }

  // 중복 체크 (전체)
  const allNames = [...KIOSK_STUDENTS.map(s=>s.name)];
  CATS.forEach(c => (MOGAK_DATA[c]?.students||[]).forEach(s => allNames.push(s.name)));
  if (allNames.includes(name)) { toast('⚠️ 이미 있는 학생이에요'); return; }

  if (!MOGAK_DATA[cat]) MOGAK_DATA[cat] = {classes:[], students:[]};
  MOGAK_DATA[cat].students.push({ name, class: classInp?.value || '' });
  nameInp.value = '';
  await saveMogakData();
  await loadStudents();
  toast('✅ ' + name + ' 추가됨!');
}
async function deleteMogakStudent(cat, name) {
  if (!confirm(name + ' 학생을 삭제할까요?')) return;
  MOGAK_DATA[cat].students = MOGAK_DATA[cat].students.filter(s => s.name !== name);
  delete ALL_MISSIONS[name];
  await saveMogakData();
  await saveTodayMissions();
  if (selectedStudent === name) { selectedStudent = null; renderMissionEditor(); }
  await loadStudents();
  toast('🗑️ ' + name + ' 삭제됨');
}

// ── 미션 로드/저장 ────────────────────────────────────────────────────────────
function getTodayKey() {
  const d = new Date();
  return 'mogakgong_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
}
async function loadTodayMissions() {
  try {
    const res = await fetch(KIOSK + '/api/config');
    const cfg = await res.json();
    ALL_MISSIONS = cfg[getTodayKey()] || {};
  } catch { ALL_MISSIONS = {}; }
}
async function saveTodayMissions() {
  try {
    const res = await fetch(KIOSK + '/api/config');
    const cfg = await res.json();
    cfg[getTodayKey()] = ALL_MISSIONS;
    await api('/api/admin/config', 'POST', cfg);
    return true;
  } catch { return false; }
}

// ── 미션 탭 카테고리 필터 ────────────────────────────────────────────────────
function renderMissionCatFilter() {
  const el = document.getElementById('mission-cat-filter');
  if (!el) return;
  const all = ['전체', ...CATS];
  el.innerHTML = all.map(c => `<button class="cat-btn ${c!=='전체'?'cat-'+c:''} ${missionCatFilter===c?'active':''}"
    onclick="missionCatFilter='${c}';renderMissionCatFilter();renderMissionStudentSelector()">${c}</button>`).join('');
}

// ── 미션 학생 셀렉터 ──────────────────────────────────────────────────────────
function getStudentCat(name) {
  for (const cat of CATS) {
    if ((MOGAK_DATA[cat]?.students||[]).some(s=>s.name===name)) return cat;
    if (KIOSK_CATS.includes(cat) && KIOSK_STUDENTS.some(s=>s.name===name)) return cat;
  }
  return null;
}

function renderMissionStudentSelector() {
  const el = document.getElementById('mission-student-selector');
  if (!el) return;
  let list = STUDENTS;
  if (missionCatFilter !== '전체') {
    list = STUDENTS.filter(s => getStudentCat(s.name) === missionCatFilter);
  }
  if (!list.length) { el.innerHTML = '<span style="font-size:12px;color:var(--gray-400)">해당 카테고리 학생 없음</span>'; return; }
  el.innerHTML = list.map(s => {
    const mCount = (ALL_MISSIONS[s.name]||[]).length;
    const hasMissions = mCount > 0;
    const isActive = selectedStudent === s.name;
    const statusTxt = hasMissions ? ('✅ '+mCount+'개') : '미설정';
    const badge = s._kiosk ? '🖥️' : '🔥';
    return `<button class="stu-sel-btn ${isActive?'active':''} ${hasMissions?'has-missions':''}"
      onclick="selectMissionStudent('${escHtml(s.name)}')">
      <div class="sel-av">${s.name[0]}</div>
      <span>${escHtml(s.name)}</span>
      <span class="sel-status">${badge} ${statusTxt}</span>
    </button>`;
  }).join('');
}

function selectMissionStudent(name) {
  selectedStudent = name;
  currentMissions = (ALL_MISSIONS[name]||[]).map(m=>({...m}));
  if (!currentMissions.length) currentMissions = getDefaultMissions();
  renderMissionStudentSelector();
  renderMissionEditor();
}

function getDefaultMissions() {
  return [{text:'개념 복습',hint:''},{text:'유형 연습문제',hint:''}];
}

// ── 프리셋 ─────────────────────────────────────────────────────────────────────
const DEFAULT_PRESETS = ['숙제 제출하기','숙제 오답하기'];
function loadCustomPresets() {
  try { const s=localStorage.getItem('mogak_presets'); return s?JSON.parse(s):[...DEFAULT_PRESETS]; }
  catch { return [...DEFAULT_PRESETS]; }
}
function saveCustomPresets(arr) { localStorage.setItem('mogak_presets',JSON.stringify(arr)); }
function loadDefaultPresets() {
  try { return JSON.parse(localStorage.getItem('mogak_default_presets')||'null')||[...DEFAULT_PRESETS]; }
  catch { return [...DEFAULT_PRESETS]; }
}
function saveDefaultPresets(arr) { localStorage.setItem('mogak_default_presets',JSON.stringify(arr)); }
let PRESETS = loadCustomPresets();

function loadRecentMissions() {
  try { return JSON.parse(localStorage.getItem('mogak_recent')||'[]'); } catch { return []; }
}
function addRecentMission(text) {
  if (!text.trim()) return;
  let r = loadRecentMissions();
  r = [text, ...r.filter(x=>x!==text)].slice(0,10);
  localStorage.setItem('mogak_recent', JSON.stringify(r));
}

// ── 미션 에디터 렌더 ─────────────────────────────────────────────────────────
function renderMissionEditor() {
  const body = document.getElementById('mission-editor-body');
  if (!body) return;
  if (!selectedStudent) { body.innerHTML = '<div class="no-student">위에서 학생을 선택해주세요 👆</div>'; return; }
  const recents = loadRecentMissions();

  const recentHTML = recents.length ? `
    <div class="recent-section">
      <div class="preset-label">🕐 최근 입력</div>
      <div class="recent-chips">${recents.map(r =>
        `<button class="recent-chip" data-preset="${escHtml(r)}" onclick="addPresetFromChip(this)">${escHtml(r)}</button>`
      ).join('')}</div>
    </div>` : '';

  body.innerHTML = `
    <div class="selected-student-name">
      ${escHtml(selectedStudent)}
      <span class="fire-tag">🔥 오늘의 미션</span>
      <span style="font-size:12px;color:var(--gray-400);font-weight:400" id="mission-count-lbl">총 ${currentMissions.length}개</span>
    </div>
    ${recentHTML}
    <div class="preset-section">
      <div class="preset-label">
        <span>⚡ 빠른 추가</span>
        <button class="preset-edit-btn" id="preset-edit-btn" onclick="togglePresetEditor()">✏️ 편집</button>
      </div>
      <div class="preset-chips" id="preset-chips-wrap">${PRESETS.map(p =>
        `<button class="preset-chip" data-preset="${escHtml(p)}" onclick="addPresetFromChip(this)">${escHtml(p)}</button>`
      ).join('')}</div>
      <div class="preset-editor" id="preset-editor">
        <div style="font-size:12px;color:var(--gray-600);margin-bottom:10px">수정 후 바깥 클릭하면 자동 저장 / ✕로 삭제</div>
        <div class="preset-edit-list" id="preset-edit-list"></div>
        <div class="preset-add-row">
          <input class="preset-edit-inp" id="preset-add-inp" placeholder="새 항목..."
                 onkeydown="if(event.key==='Enter'){event.preventDefault();addPresetItem();}"/>
          <button class="btn btn-blue btn-sm" onclick="addPresetItem()">+ 추가</button>
        </div>
        <div class="preset-editor-btns">
          <button class="btn btn-gray btn-sm" onclick="resetPresets()">🔄 기본값으로</button>
          <button class="btn btn-gray btn-sm" onclick="setAsDefault()">📌 현재를 기본값으로</button>
        </div>
      </div>
    </div>
    <div class="mission-list" id="current-mission-list">${renderMissionRows()}</div>
    <div class="add-mission-row">
      <input class="add-mission-inp" id="new-mission-inp" placeholder="새 미션 직접 입력..."
             onkeydown="if(event.key==='Enter')addMission()"/>
      <button class="add-mission-btn" onclick="addMission()">+ 추가</button>
    </div>
    <div class="save-bar">
      <div class="save-hint">💡 저장하면 학생 화면에 즉시 반영돼요</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="save-status"></span>
        <button class="save-btn" onclick="saveMissions()">저장하기 💾</button>
      </div>
    </div>`;
}

function renderMissionRows() {
  if (!currentMissions.length) return '<div style="text-align:center;padding:16px;color:var(--gray-400);font-size:13px">미션을 추가해보세요!</div>';
  return currentMissions.map((m,i) => `
    <div class="mission-row">
      <span class="mission-num">${i+1}</span>
      <input class="mission-text-input" value="${escHtml(m.text)}" placeholder="미션 내용"
             oninput="currentMissions[${i}].text=this.value"/>
      <input class="mission-hint-input" value="${escHtml(m.hint||'')}" placeholder="세부 내용 (선택)"
             oninput="currentMissions[${i}].hint=this.value"/>
      <button class="mission-del" onclick="delMission(${i})">✕</button>
    </div>`).join('');
}

function refreshMissionList() {
  const el = document.getElementById('current-mission-list');
  if (el) el.innerHTML = renderMissionRows();
  const lbl = document.getElementById('mission-count-lbl');
  if (lbl) lbl.textContent = '총 ' + currentMissions.length + '개';
}

function addPresetFromChip(el) {
  const text = el.getAttribute('data-preset');
  if (text) addPreset(text);
}
function addPreset(text) {
  if (!text||!text.trim()) return;
  if (!selectedStudent) { toast('⚠️ 먼저 학생을 선택해주세요'); return; }
  currentMissions.push({text:text.trim(), hint:''});
  addRecentMission(text.trim());
  refreshMissionList();
}
function addMission() {
  const inp = document.getElementById('new-mission-inp');
  const val = inp?.value.trim();
  if (!val) return;
  currentMissions.push({text:val, hint:''});
  addRecentMission(val);
  inp.value = '';
  refreshMissionList();
}
function delMission(i) { currentMissions.splice(i,1); refreshMissionList(); }

async function saveMissions() {
  if (!selectedStudent) return;
  ALL_MISSIONS[selectedStudent] = currentMissions.map(m=>({...m}));
  const btn = document.querySelector('.save-btn');
  const statusEl = document.getElementById('save-status');
  btn.disabled = true; btn.textContent = '저장 중...';
  const ok = await saveTodayMissions();
  btn.disabled = false; btn.textContent = '저장하기 💾';
  if (ok) {
    statusEl.className = 'save-status ok'; statusEl.textContent = '✓ 저장 완료!';
    toast('✅ ' + selectedStudent + ' 미션 저장됨!');
    renderMissionStudentSelector();
  } else {
    statusEl.className = 'save-status err'; statusEl.textContent = '⚠️ 저장 실패';
    toast('⚠️ 저장 실패');
  }
  setTimeout(()=>{ if(statusEl){statusEl.textContent='';statusEl.className='save-status';} },3000);
}

// ── 프리셋 편집 ───────────────────────────────────────────────────────────────
let _presetEditorOpen = false;
function togglePresetEditor() {
  _presetEditorOpen = !_presetEditorOpen;
  const editor = document.getElementById('preset-editor');
  const btn = document.getElementById('preset-edit-btn');
  if (!editor||!btn) return;
  if (_presetEditorOpen) { editor.classList.add('open'); renderPresetEditList(); btn.textContent='✕ 닫기'; }
  else { editor.classList.remove('open'); btn.textContent='✏️ 편집'; }
}
function renderPresetEditList() {
  const el = document.getElementById('preset-edit-list');
  if (!el) return;
  el.innerHTML = PRESETS.length ? PRESETS.map((p,i) => `
    <div class="preset-edit-row">
      <input class="preset-edit-inp" value="${escHtml(p)}"
             onchange="PRESETS[${i}]=this.value.trim();saveCustomPresets(PRESETS);refreshPresetChips();"
             onblur="if(!this.value.trim()){PRESETS.splice(${i},1);saveCustomPresets(PRESETS);renderPresetEditList();refreshPresetChips();}"/>
      <button class="btn btn-red btn-xs" onclick="PRESETS.splice(${i},1);saveCustomPresets(PRESETS);renderPresetEditList();refreshPresetChips();">✕</button>
    </div>`).join('') : '<div style="color:var(--gray-400);font-size:13px">항목이 없어요</div>';
}
function addPresetItem() {
  const inp = document.getElementById('preset-add-inp');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  PRESETS.push(val); saveCustomPresets(PRESETS);
  inp.value = ''; renderPresetEditList(); refreshPresetChips(); inp.focus();
}
function refreshPresetChips() {
  const wrap = document.getElementById('preset-chips-wrap');
  if (!wrap) return;
  wrap.innerHTML = PRESETS.map(p => `<button class="preset-chip" data-preset="${escHtml(p)}" onclick="addPresetFromChip(this)">${escHtml(p)}</button>`).join('');
}
function resetPresets() {
  const defs = loadDefaultPresets();
  if (!confirm('기본값('+defs.join(', ')+')으로 되돌릴까요?')) return;
  PRESETS = [...defs]; saveCustomPresets(PRESETS); renderPresetEditList(); refreshPresetChips();
  toast('🔄 기본값으로 되돌렸어요');
}
function setAsDefault() {
  if (!PRESETS.length) { toast('⚠️ 항목이 없어요'); return; }
  saveDefaultPresets([...PRESETS]); toast('📌 현재 목록이 기본값으로 저장됐어요!');
}

// ── 현황 보기 ─────────────────────────────────────────────────────────────────
function renderOverviewCatFilter() {
  const el = document.getElementById('overview-cat-filter');
  if (!el) return;
  const all = ['전체', ...CATS];
  el.innerHTML = all.map(c => `<button class="cat-btn ${c!=='전체'?'cat-'+c:''} ${overviewCatFilter===c?'active':''}"
    onclick="overviewCatFilter='${c}';renderOverviewCatFilter();loadOverview()">${c}</button>`).join('');
}
async function loadOverview() {
  await loadTodayMissions();
  renderOverviewCatFilter();
  const g = document.getElementById('overview-grid');
  let list = STUDENTS;
  if (overviewCatFilter !== '전체') list = STUDENTS.filter(s => getStudentCat(s.name) === overviewCatFilter);
  if (!list.length) { g.innerHTML = '<div style="color:var(--gray-400)">해당 카테고리 학생 없음</div>'; return; }

  g.innerHTML = list.map(s => {
    const missions = ALL_MISSIONS[s.name] || [];
    const cat = getStudentCat(s.name);
    const catIcon = cat ? CAT_ICONS[cat] : '';
    const ptsHTML = s.points !== null ? `<div class="ov-sub">🏅 ${s.points}P</div>` : '';
    const missionsHTML = missions.length
      ? missions.map(m => {
          const hintHTML = m.hint ? `<div class="ov-hint">${escHtml(m.hint)}</div>` : '';
          return `<div class="ov-mission-item"><div><span>${escHtml(m.text)}</span>${hintHTML}</div></div>`;
        }).join('')
      : '<div class="no-missions-msg">오늘 미션 없음</div>';

    return `<div class="overview-card">
      <div class="ov-stu-header">
        <div class="ov-av">${s.name[0]}</div>
        <div>
          <div class="ov-name">${escHtml(s.name)}</div>
          <div class="ov-sub">${catIcon} ${cat||''}</div>
          ${ptsHTML}
        </div>
      </div>
      <div class="ov-missions">${missionsHTML}</div>
    </div>`;
  }).join('');
}

// ── 링크 생성 ─────────────────────────────────────────────────────────────────
function loadLinks() {
  const el = document.getElementById('link-list');
  if (!STUDENTS.length) { el.innerHTML = '<div style="color:var(--gray-400)">학생 없음</div>'; return; }

  // 카테고리별 그룹핑
  const groups = {};
  CATS.forEach(cat => { groups[cat] = []; });
  STUDENTS.forEach(s => {
    const cat = getStudentCat(s.name) || '미분류';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(s);
  });

  el.innerHTML = CATS.map(cat => {
    const stus = groups[cat] || [];
    if (!stus.length) return '';
    return `<div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:900;color:var(--gray-400);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${CAT_ICONS[cat]} ${cat}</div>
      ${stus.map(s => {
        const url = MOGAKGONG_URL + '?name=' + encodeURIComponent(s.name);
        const sub = s._kiosk ? '키오스크 연동' : (s._cat||'');
        return `<div class="link-card">
          <div><div class="link-stu-name">${escHtml(s.name)}</div><div class="link-stu-sub">${sub}</div></div>
          <div class="link-url">${url}</div>
          <button class="link-copy-btn" id="lcb-${escHtml(s.id||s.name)}"
            onclick="copyLink(${JSON.stringify(String(s.id||s.name))},${JSON.stringify(url)},${JSON.stringify(s.name)})">
            📋 복사
          </button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function copyLink(id, url, name) {
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('lcb-' + id);
    if (btn) { btn.textContent = '✓ 복사됨!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='📋 복사'; btn.classList.remove('copied'); },2000); }
    toast('🔗 ' + name + ' 링크 복사됨!');
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['missions','overview','students','links'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if (el) el.style.display = t===tab ? 'block' : 'none';
  });
  if (tab==='overview') { renderOverviewCatFilter(); loadOverview(); }
  if (tab==='students') loadStudents();
  if (tab==='links') loadLinks();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

// ── AUTO LOGIN ────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('mogak_admin_pw');
  if (saved) { PW = saved; showApp(); }
});
</script>
