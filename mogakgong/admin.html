<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모각공 어드민</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fire:#FE5F3C;--fire2:#FF9A2E;--fire-soft:rgba(254,95,60,.1);--fire-border:rgba(254,95,60,.25);
  --bg:#F7F4F2;--white:#fff;
  --g100:#F1EDE9;--g200:#E4DDD7;--g400:#A89D95;--g600:#6B5F57;--g800:#2C2018;
  --green:#22A55A;--gs:rgba(34,165,90,.1);
  --red:#E84545;--rs:rgba(232,69,69,.1);
  --blue:#3B82F6;--bs:rgba(59,130,246,.1);
  --purple:#8B5CF6;--ps:rgba(139,92,246,.1);
  --orange:#F97316;--os:rgba(249,115,22,.1);

  /* 카테고리 색 */
  --c-em:#3B82F6;  --c-em-s:rgba(59,130,246,.1);   /* 초등영어 */
  --c-hm:#8B5CF6;  --c-hm-s:rgba(139,92,246,.1);   /* 중고등영어 */
  --c-es:#22A55A;  --c-es-s:rgba(34,165,90,.1);    /* 초등수학 */
  --c-hs:#FE5F3C;  --c-hs-s:rgba(254,95,60,.1);    /* 중고등수학 */
}
body{background:var(--bg);color:var(--g800);font-family:'Noto Sans KR',sans-serif;min-height:100vh}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1A0E08,#2C1810)}
.login-box{background:var(--white);border-radius:24px;padding:40px 36px;width:min(400px,96vw);text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:900;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--g400);margin-bottom:28px}
.login-inp{width:100%;border:2px solid var(--g200);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:16px;font-weight:700;outline:none;text-align:center;letter-spacing:6px;transition:border-color .2s}
.login-inp:focus{border-color:var(--fire)}
.login-btn{width:100%;margin-top:12px;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer}
.login-err{font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}

/* ── LAYOUT ── */
.app{display:none}.app.visible{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--white);border-bottom:1.5px solid var(--g200);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.hdr-brand{font-size:17px;font-weight:900}.hdr-brand span{color:var(--fire)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-date{font-size:12px;color:var(--g400)}
.hdr-kiosk{display:flex;align-items:center;gap:4px;background:var(--fire-soft);border:1px solid var(--fire-border);color:var(--fire);font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;text-decoration:none}
.logout-btn{background:var(--g100);border:1px solid var(--g200);color:var(--g600);font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer}
.main{flex:1;padding:20px 24px;max-width:1100px;margin:0 auto;width:100%}

/* ── MAIN TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--white);border-radius:14px;padding:5px;border:1.5px solid var(--g200);width:fit-content;flex-wrap:wrap}
.tab{font-family:inherit;font-size:13px;font-weight:700;padding:8px 16px;border-radius:10px;border:none;background:transparent;color:var(--g400);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--fire);color:#fff;box-shadow:0 2px 12px rgba(254,95,60,.3)}

/* ── 카테고리 탭 ── */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ct{font-family:inherit;font-size:13px;font-weight:700;padding:7px 16px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);color:var(--g600);cursor:pointer;transition:all .15s}
.ct:hover{opacity:.85}
.ct.active-all{background:var(--g800);border-color:var(--g800);color:#fff}
.ct.active-초등영어{background:var(--c-em);border-color:var(--c-em);color:#fff}
.ct.active-중고등영어{background:var(--c-hm);border-color:var(--c-hm);color:#fff}
.ct.active-초등수학{background:var(--c-es);border-color:var(--c-es);color:#fff}
.ct.active-중고등수학{background:var(--c-hs);border-color:var(--c-hs);color:#fff}

/* ── CARD ── */
.card{background:var(--white);border-radius:16px;border:1.5px solid var(--g200);margin-bottom:14px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1.5px solid var(--g100);gap:10px;flex-wrap:wrap}
.card-title{font-size:14px;font-weight:900}
.card-body{padding:16px 18px}

/* ── BUTTONS / INPUTS ── */
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-fire{background:var(--fire);color:#fff}.btn-fire:hover{opacity:.9}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.9}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.9}
.btn-gray{background:var(--g100);color:var(--g600);border:1.5px solid var(--g200)}.btn-gray:hover{background:var(--g200)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.inp{width:100%;border:1.5px solid var(--g200);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px;outline:none;background:var(--white);transition:border-color .2s}
.inp:focus{border-color:var(--fire)}
.sel{border:1.5px solid var(--g200);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:13px;outline:none;background:var(--white);cursor:pointer}
.refresh-btn{padding:7px 14px;border-radius:10px;border:1.5px solid var(--g200);background:var(--white);color:var(--g600);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.refresh-btn:hover{border-color:var(--fire-border);color:var(--fire)}

/* ── 학생 셀렉터 (미션 탭) ── */
.stu-selector{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;padding:4px 0 10px}
.stu-btn{font-family:inherit;padding:11px 6px 9px;border-radius:12px;border:2px solid var(--g200);background:var(--white);color:var(--g600);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.stu-btn:hover{border-color:var(--fire-border);background:var(--fire-soft)}
.stu-btn.active{border-color:var(--fire);background:var(--fire-soft)}
.stu-btn .av{width:34px;height:34px;border-radius:50%;background:var(--g100);border:2px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--g400)}
.stu-btn.active .av{background:var(--fire);border-color:var(--fire);color:#fff}
.stu-btn.has-m .av{background:var(--green-soft,rgba(34,165,90,.1));border-color:var(--green);color:var(--green)}
.stu-btn.active.has-m .av{background:var(--green);border-color:var(--green);color:#fff}
.stu-btn .sn{font-size:13px;font-weight:900;text-align:center}
.stu-btn .ss{font-size:10px;font-weight:700;color:var(--g400)}
.stu-btn.has-m .ss{color:var(--green)}

/* ── MISSION EDITOR ── */
.ed-wrap{background:var(--white);border-radius:18px;border:1.5px solid var(--g200);overflow:hidden;margin-bottom:20px}
.ed-head{padding:14px 18px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ed-title{font-size:14px;font-weight:900}
.ed-body{padding:18px}
.no-stu{text-align:center;padding:28px;color:var(--g400);font-size:14px}
.sel-name{font-size:17px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cat-pill{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px}
.mission-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.m-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--g100);border-radius:9px;border:1.5px solid transparent}
.m-row:hover{background:var(--white);border-color:var(--g200)}
.m-num{font-size:10px;font-weight:900;color:var(--g400);width:18px;text-align:center;flex-shrink:0}
.m-text{flex:2;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--g800);outline:none;min-width:60px}
.m-hint{flex:1;border:1px solid var(--g200);border-radius:7px;padding:5px 8px;font-family:inherit;font-size:12px;color:var(--g600);outline:none;background:var(--white);min-width:50px}
.m-hint:focus{border-color:var(--fire-border)}
.m-del{width:24px;height:24px;border-radius:6px;border:none;background:var(--rs);color:var(--red);font-size:12px;cursor:pointer;flex-shrink:0}
.add-row{display:flex;gap:8px}
.add-inp{flex:1;border:2px dashed var(--g200);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:14px;outline:none;background:var(--white);transition:border-color .2s}
.add-inp:focus{border-color:var(--fire-border)}
.add-btn{padding:9px 14px;border-radius:9px;border:none;background:var(--fire-soft);color:var(--fire);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.add-btn:hover{background:var(--fire);color:#fff}
.save-bar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:var(--g100);border-top:1.5px solid var(--g200);gap:10px;flex-wrap:wrap;margin:0 -18px -18px}
.save-hint{font-size:12px;color:var(--g400)}
.save-btn{padding:9px 20px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.save-st{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.save-st.ok{background:var(--gs);color:var(--green)}
.save-st.err{background:var(--rs);color:var(--red)}

/* ── 프리셋 ── */
.pre-sec{margin-bottom:12px}
.pre-label{font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.08em;margin-bottom:7px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.pre-edit-btn{font-family:inherit;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);color:var(--g400);cursor:pointer}
.pre-chips{display:flex;gap:5px;flex-wrap:wrap}
.pre-chip{font-family:inherit;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);color:var(--g600);cursor:pointer}
.pre-chip:hover{border-color:var(--fire-border);color:var(--fire);background:var(--fire-soft)}
.rec-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.rec-chip{font-family:inherit;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;border:1.5px solid rgba(59,130,246,.25);background:rgba(59,130,246,.06);color:var(--blue);cursor:pointer}
.pre-editor{display:none;background:var(--g100);border-radius:11px;padding:12px;margin-top:7px;border:1.5px solid var(--g200)}
.pre-editor.open{display:block}
.pe-list{display:flex;flex-direction:column;gap:6px;margin-bottom:9px}
.pe-row{display:flex;align-items:center;gap:6px}
.pe-inp{flex:1;border:1.5px solid var(--g200);border-radius:8px;padding:6px 10px;font-family:inherit;font-size:13px;outline:none;background:var(--white)}
.pe-inp:focus{border-color:var(--fire)}
.pe-add-row{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--g200)}

/* ── 학생 관리 카드 ── */
.stu-chip-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.stu-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;font-size:13px;font-weight:700}
.stu-chip-del{font-size:12px;color:var(--g400);cursor:pointer;line-height:1}
.stu-chip-del:hover{color:var(--red)}

/* ── OVERVIEW ── */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ov-card{background:var(--white);border-radius:14px;border:1.5px solid var(--g200);padding:15px}
.ov-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.ov-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.ov-name{font-size:13px;font-weight:900}
.ov-sub{font-size:11px;color:var(--g400);margin-top:1px}
.ov-m-list{display:flex;flex-direction:column;gap:3px}
.ov-m-item{font-size:12px;color:var(--g600);display:flex;align-items:flex-start;gap:5px}
.ov-m-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--g200);flex-shrink:0;margin-top:6px}
.ov-m-hint{font-size:11px;color:var(--g400)}
.ov-empty{font-size:11px;color:var(--g400);text-align:center;padding:8px 0}

/* ── LINK ── */
.link-card{background:var(--white);border:1.5px solid var(--g200);border-radius:13px;padding:13px 16px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.link-name{font-size:13px;font-weight:900;min-width:80px}
.link-sub{font-size:11px;color:var(--g400);margin-top:1px}
.link-url{font-size:11px;color:var(--g400);background:var(--g100);border-radius:7px;padding:6px 10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.link-copy{padding:7px 13px;border-radius:9px;border:1.5px solid var(--fire-border);background:var(--fire-soft);color:var(--fire);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.link-copy.copied{background:var(--gs);border-color:var(--green);color:var(--green)}

/* ── LOG TABLE ── */
.log-table{width:100%;border-collapse:collapse}
.log-table th{text-align:left;font-size:11px;font-weight:700;color:var(--g400);padding:8px 12px;border-bottom:1.5px solid var(--g200);text-transform:uppercase}
.log-table td{padding:10px 12px;border-bottom:1px solid var(--g100);font-size:13px}
.log-table tr:last-child td{border-bottom:none}
.log-pos{color:var(--green);font-weight:700}
.log-neg{color:var(--red);font-weight:700}
.log-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.log-badge.learn{background:var(--gs);color:var(--green)}
.log-badge.fine{background:var(--rs);color:var(--red)}
.log-badge.shop{background:var(--bs);color:var(--blue)}
.log-badge.admin{background:var(--g100);color:var(--g600)}

/* ── 카테고리 컬러 헬퍼 ── */
.cat-초등영어{--cc:var(--c-em);--cs:var(--c-em-s)}
.cat-중고등영어{--cc:var(--c-hm);--cs:var(--c-hm-s)}
.cat-초등수학{--cc:var(--c-es);--cs:var(--c-es-s)}
.cat-중고등수학{--cc:var(--c-hs);--cs:var(--c-hs-s)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--g800);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:9999;animation:ti .3s ease;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── 모달 ── */
.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal-box{background:var(--white);border-radius:20px;padding:24px;width:min(420px,96vw);box-shadow:0 24px 60px rgba(0,0,0,.18)}
.modal-title{font-size:16px;font-weight:900;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:12px;font-weight:700;color:var(--g600);margin-bottom:5px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

@media(max-width:600px){.main{padding:14px}.hdr{padding:0 14px}.link-card{flex-wrap:wrap}.link-url{flex:100%;order:3}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">🔥</div>
    <div class="login-title">모각공 어드민</div>
    <div class="login-sub">선생님 전용 관리 화면이에요</div>
    <input class="login-inp" type="password" id="pw-inp" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err">비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <header class="hdr">
    <div class="hdr-brand">🔥 모각공 <span>어드민</span></div>
    <div class="hdr-right">
      <span class="hdr-date" id="hdr-date"></span>
      <a class="hdr-kiosk" href="https://bakuum-kiosk.pages.dev" target="_blank">🖥️ 키오스크</a>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('missions',this)">📋 미션 입력</button>
      <button class="tab" onclick="switchTab('overview',this)">👀 현황 보기</button>
      <button class="tab" onclick="switchTab('students',this)">🎓 원생 관리</button>
      <button class="tab" onclick="switchTab('links',this)">🔗 링크 생성</button>
    </div>

    <!-- ── 미션 입력 ── -->
    <div id="tab-missions">
      <div class="ed-wrap">
        <div class="ed-head">
          <div class="ed-title">📋 오늘의 미션 입력</div>
        </div>
        <div style="padding:0 18px">
          <div class="cat-tabs" id="mission-cat-tabs"></div>
          <div class="stu-selector" id="mission-stu-sel">
            <span style="font-size:12px;color:var(--g400)">로딩 중...</span>
          </div>
        </div>
        <div class="ed-body" id="ed-body">
          <div class="no-stu">위에서 카테고리와 학생을 선택해주세요 👆</div>
        </div>
      </div>
    </div>

    <!-- ── 현황 보기 ── -->
    <div id="tab-overview" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:900">👀 오늘의 미션 현황</div>
        <button class="refresh-btn" onclick="loadOverview()">↻ 새로고침</button>
      </div>
      <div class="cat-tabs" id="overview-cat-tabs"></div>
      <div class="ov-grid" id="ov-grid"><div style="color:var(--g400);font-size:13px">로딩 중...</div></div>
    </div>

    <!-- ── 원생 관리 ── -->
    <div id="tab-students" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:900">🎓 원생 관리</div>
        <button class="refresh-btn" onclick="loadStudents()">↻ 새로고침</button>
      </div>
      <div class="cat-tabs" id="students-cat-tabs"></div>
      <div id="students-body"></div>
    </div>

    <!-- ── 링크 생성 ── -->
    <div id="tab-links" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:900">🔗 링크 생성</div>
        <button class="refresh-btn" onclick="renderLinks()">↻ 새로고침</button>
      </div>
      <div style="background:var(--fire-soft);border:1.5px solid var(--fire-border);border-radius:11px;padding:10px 14px;font-size:13px;color:var(--fire);font-weight:600;margin-bottom:14px">
        🔗 링크를 카카오톡으로 학생에게 보내면 본인 이름으로 모각공이 열려요!
      </div>
      <div class="cat-tabs" id="links-cat-tabs"></div>
      <div id="link-list"></div>
    </div>
  </main>
</div>

<!-- 키오스크 학생 카테고리 배정 모달 -->
<div class="modal-ov" id="kiosk-cat-modal" onclick="if(event.target===this)closeKioskCatModal()">
  <div class="modal-box">
    <div class="modal-title">🖥️ 키오스크 학생 카테고리 배정</div>
    <div class="modal-field">
      <label>학생</label>
      <div id="kiosk-cat-name" style="font-size:15px;font-weight:900;padding:8px 0"></div>
    </div>
    <div class="modal-field">
      <label>카테고리 선택</label>
      <select class="sel" id="kiosk-cat-sel" style="width:100%">
        <option value="">카테고리 없음</option>
        <option value="초등수학">📐 초등수학</option>
        <option value="중고등수학">📏 중고등수학</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-gray btn-sm" onclick="closeKioskCatModal()">취소</button>
      <button class="btn btn-fire" onclick="saveKioskCat()">저장</button>
    </div>
  </div>
</div>

<script>
// ── 상수 ──────────────────────────────────────────────────────────────────────
const KIOSK = 'https://bakuum-kiosk.pages.dev';
const MOGAKGONG_URL = 'https://mogakgong.pages.dev/index.html';
const CATS = ['초등영어','중고등영어','초등수학','중고등수학'];
const CAT_ICON = {'초등영어':'📘','중고등영어':'📗','초등수학':'📐','중고등수학':'📏'};
const CAT_COLOR = {'초등영어':'var(--c-em)','중고등영어':'var(--c-hm)','초등수학':'var(--c-es)','중고등수학':'var(--c-hs)'};
const CAT_SOFT = {'초등영어':'var(--c-em-s)','중고등영어':'var(--c-hm-s)','초등수학':'var(--c-es-s)','중고등수학':'var(--c-hs-s)'};

// ── 상태 ──────────────────────────────────────────────────────────────────────
let PW = '';
let KIOSK_STUDENTS = [];          // [{id,name,points,...}]
let KIOSK_CATS = {};              // {name: '초등수학'|'중고등수학'} — app_config.kiosk_cats
let MOGAK_STUDENTS = [];          // [{name, cat}]  cat = 4개 중 하나
let ALL_MISSIONS = {};            // {name_cat: [{text,hint}]}
let STUDENTS = [];                // 전체 [{name, cat, _kiosk?}]
let selStudent = null;            // 현재 선택된 미션 학생 key (name_cat)
let selStudentName = '';
let selStudentCat = '';
let missionCat = '전체';
let overviewCat = '전체';
let studentsCat = '전체';
let linksCat = '전체';
let _kioskCatTarget = null;

// ── 로그인 ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pw-inp').value.trim();
  if (!pw) return;
  try {
    const r = await fetch(KIOSK + '/api/admin/auth', {headers:{'X-Admin-Password':pw}});
    const d = await r.json();
    if (d.success) { PW = pw; sessionStorage.setItem('mogak_pw',pw); showApp(); }
    else showLoginErr();
  } catch { showLoginErr(); }
}
function showLoginErr() {
  document.getElementById('login-err').classList.add('show');
  document.getElementById('pw-inp').style.borderColor = 'var(--red)';
}
function doLogout() {
  PW=''; sessionStorage.removeItem('mogak_pw');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('pw-inp').value='';
}
function showApp() {
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').classList.add('visible');
  const d=new Date();
  document.getElementById('hdr-date').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
  initApp();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path,method='GET',body=null) {
  const opts={headers:{'X-Admin-Password':PW}};
  if(method!=='GET'){opts.method=method;opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  return (await fetch(KIOSK+path,opts)).json();
}
async function getConfig() {
  const r=await fetch(KIOSK+'/api/config'); return r.json();
}
async function setConfig(cfg) {
  await api('/api/admin/config','POST',cfg);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initApp() {
  await loadStudents();
  await loadTodayMissions();
  renderAllCatTabs();
  renderMissionStuSel();
}

// ── 데이터 로드 ───────────────────────────────────────────────────────────────
async function loadStudents() {
  // 키오스크 학생
  try { const d=await api('/api/students'); if(d.success) KIOSK_STUDENTS=d.students; }
  catch { KIOSK_STUDENTS=[]; }

  // 설정 로드 (모각공 학생 + 키오스크 카테고리)
  try {
    const cfg=await getConfig();
    // mogak_students 마이그레이션 (구버전 호환)
    const raw=cfg.mogak_students||[];
    MOGAK_STUDENTS=raw.map(s=>{
      if(typeof s==='string') return {name:s,cat:'초등수학'};
      // 구버전 classes 배열 → cat 단일값
      if(s.classes) return {name:s.name, cat:s.classes[0]==='영어'?'초등영어':s.classes[0]||'초등수학'};
      return s;
    });
    KIOSK_CATS=cfg.kiosk_cats||{};
  } catch { MOGAK_STUDENTS=[]; KIOSK_CATS={}; }

  // 전체 학생 목록 합치기
  const mogakNames=new Set(MOGAK_STUDENTS.map(s=>s.name));
  STUDENTS=[
    ...MOGAK_STUDENTS.map(s=>({...s,_kiosk:false})),
    ...KIOSK_STUDENTS
      .filter(s=>!mogakNames.has(s.name))
      .map(s=>({name:s.name,cat:KIOSK_CATS[s.name]||'',points:s.points,_kiosk:true}))
  ];

  renderStudentsBody();
}

async function saveMogakStudents() {
  const cfg=await getConfig();
  cfg.mogak_students=MOGAK_STUDENTS;
  await setConfig(cfg);
}
async function saveKioskCats() {
  const cfg=await getConfig();
  cfg.kiosk_cats=KIOSK_CATS;
  await setConfig(cfg);
}

// ── 미션 ──────────────────────────────────────────────────────────────────────
function getTodayKey() {
  const d=new Date();
  return 'mogakgong_'+d.getFullYear()+'_'+(d.getMonth()+1)+'_'+d.getDate();
}
async function loadTodayMissions() {
  try { const cfg=await getConfig(); ALL_MISSIONS=cfg[getTodayKey()]||{}; }
  catch { ALL_MISSIONS={}; }
}
async function saveTodayMissions() {
  try { const cfg=await getConfig(); cfg[getTodayKey()]=ALL_MISSIONS; await setConfig(cfg); return true; }
  catch { return false; }
}

// ── 카테고리 탭 렌더 ─────────────────────────────────────────────────────────
const TAB_FILTER_MAP = {
  'mission-cat-tabs': ()=>missionCat,
  'overview-cat-tabs': ()=>overviewCat,
  'students-cat-tabs': ()=>studentsCat,
  'links-cat-tabs': ()=>linksCat,
};
const TAB_SET_MAP = {
  'mission-cat-tabs': v=>{missionCat=v;renderMissionStuSel();},
  'overview-cat-tabs': v=>{overviewCat=v;renderOverviewGrid();},
  'students-cat-tabs': v=>{studentsCat=v;renderStudentsBody();},
  'links-cat-tabs': v=>{linksCat=v;renderLinks();},
};

function renderCatTabs(elId) {
  const el=document.getElementById(elId);
  if(!el) return;
  const cur=TAB_FILTER_MAP[elId]();
  const all=['전체',...CATS];
  el.innerHTML=all.map(c=>{
    const isActive=cur===c;
    const cls=isActive?(c==='전체'?'active-all':'active-'+c):'';
    return `<button class="ct ${cls}" onclick="TAB_SET_MAP['${elId}']('${c}');renderCatTabs('${elId}')">${c==='전체'?'전체':(CAT_ICON[c]+' '+c)}</button>`;
  }).join('');
}
function renderAllCatTabs() {
  Object.keys(TAB_FILTER_MAP).forEach(id=>renderCatTabs(id));
}

// ── 미션 학생 셀렉터 ─────────────────────────────────────────────────────────
function getFilteredStudents(cat) {
  if(cat==='전체') return STUDENTS.filter(s=>s.cat);
  return STUDENTS.filter(s=>s.cat===cat);
}

function renderMissionStuSel() {
  const el=document.getElementById('mission-stu-sel');
  if(!el) return;
  const list=getFilteredStudents(missionCat);
  if(!list.length){el.innerHTML='<span style="font-size:12px;color:var(--g400)">해당 카테고리에 학생이 없어요</span>';return;}
  el.innerHTML=list.map(s=>{
    const key=s.name+'_'+s.cat;
    const mc=(ALL_MISSIONS[key]||[]).length;
    const isActive=selStudent===key;
    const hasM=mc>0;
    return `<button class="stu-btn ${isActive?'active':''} ${hasM?'has-m':''}"
      onclick="selectStudent('${esc(key)}','${esc(s.name)}','${esc(s.cat)}')">
      <div class="av">${s.name[0]}</div>
      <span class="sn">${esc(s.name)}</span>
      <span class="ss">${CAT_ICON[s.cat]||''} ${hasM?'✅'+mc+'개':'미설정'}</span>
    </button>`;
  }).join('');
}

let currentMissions=[];
function selectStudent(key,name,cat) {
  selStudent=key; selStudentName=name; selStudentCat=cat;
  currentMissions=(ALL_MISSIONS[key]||[]).map(m=>({...m}));
  if(!currentMissions.length) currentMissions=[{text:'',hint:''},{text:'',hint:''}];
  renderMissionStuSel();
  renderEdBody();
}

// ── 미션 에디터 ───────────────────────────────────────────────────────────────
function renderEdBody() {
  const el=document.getElementById('ed-body');
  if(!el) return;
  if(!selStudent){el.innerHTML='<div class="no-stu">위에서 학생을 선택해주세요 👆</div>';return;}
  const color=CAT_COLOR[selStudentCat]||'var(--fire)';
  const soft=CAT_SOFT[selStudentCat]||'var(--fire-soft)';
  const recents=loadRecents();
  el.innerHTML=`
    <div class="sel-name">
      ${esc(selStudentName)}
      <span class="cat-pill" style="background:${soft};color:${color}">${CAT_ICON[selStudentCat]||''} ${esc(selStudentCat)}</span>
      <span style="font-size:12px;color:var(--g400);font-weight:400" id="m-cnt">총 ${currentMissions.filter(m=>m.text).length}개</span>
    </div>
    ${recents.length?`<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">🕐 최근 입력</div>
      <div class="rec-chips">${recents.map(r=>`<button class="rec-chip" data-p="${esc(r)}" onclick="addFromChip(this)">${esc(r)}</button>`).join('')}</div>
    </div>`:''}
    <div style="margin-bottom:10px">
      <div class="pre-label">
        <span>⚡ 빠른 추가</span>
        <button class="pre-edit-btn" id="pre-edit-btn" onclick="togglePreEditor()">✏️ 편집</button>
      </div>
      <div class="pre-chips" id="pre-chips">${loadPresets().map(p=>`<button class="pre-chip" data-p="${esc(p)}" onclick="addFromChip(this)">${esc(p)}</button>`).join('')}</div>
      <div class="pre-editor" id="pre-editor">
        <div style="font-size:12px;color:var(--g600);margin-bottom:8px">수정 후 바깥 클릭 자동저장 · ✕로 삭제</div>
        <div class="pe-list" id="pe-list"></div>
        <div class="pe-add-row">
          <input class="pe-inp" id="pe-add-inp" placeholder="새 항목..." onkeydown="if(event.key==='Enter'){event.preventDefault();addPresetItem();}"/>
          <button class="btn btn-blue btn-sm" onclick="addPresetItem()">+ 추가</button>
        </div>
      </div>
    </div>
    <div class="mission-list" id="m-list">${renderMRows()}</div>
    <div class="add-row">
      <input class="add-inp" id="add-inp" placeholder="새 미션 입력..." onkeydown="if(event.key==='Enter')addMission()"/>
      <button class="add-btn" onclick="addMission()">+ 추가</button>
    </div>
    <div class="save-bar">
      <div class="save-hint">💡 저장하면 학생 화면에 즉시 반영돼요</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="save-st"></span>
        <button class="save-btn" onclick="saveMissions()">저장하기 💾</button>
      </div>
    </div>`;
}

function renderMRows() {
  if(!currentMissions.filter(m=>m.text).length&&!currentMissions.length)
    return '<div style="text-align:center;padding:14px;color:var(--g400);font-size:13px">미션을 추가해보세요!</div>';
  return currentMissions.map((m,i)=>`
    <div class="m-row">
      <span class="m-num">${i+1}</span>
      <input class="m-text" value="${esc(m.text)}" placeholder="미션 내용" oninput="currentMissions[${i}].text=this.value;updateMCnt()"/>
      <input class="m-hint" value="${esc(m.hint||'')}" placeholder="세부 내용 (선택)" oninput="currentMissions[${i}].hint=this.value"/>
      <button class="m-del" onclick="delM(${i})">✕</button>
    </div>`).join('');
}
function updateMCnt(){const el=document.getElementById('m-cnt');if(el)el.textContent='총 '+currentMissions.filter(m=>m.text).length+'개';}
function refreshMList(){const el=document.getElementById('m-list');if(el)el.innerHTML=renderMRows();updateMCnt();}

function addFromChip(el){const t=el.getAttribute('data-p');if(t)addMissionText(t);}
function addMission(){const inp=document.getElementById('add-inp');if(!inp)return;const v=inp.value.trim();if(!v)return;addMissionText(v);inp.value='';}
function addMissionText(text){
  if(!selStudent){toast('⚠️ 먼저 학생을 선택해주세요');return;}
  currentMissions.push({text,hint:''});
  addRecent(text);
  refreshMList();
}
function delM(i){currentMissions.splice(i,1);refreshMList();}

async function saveMissions(){
  if(!selStudent) return;
  ALL_MISSIONS[selStudent]=currentMissions.filter(m=>m.text.trim()).map(m=>({...m}));
  const btn=document.querySelector('.save-btn');
  const st=document.getElementById('save-st');
  btn.disabled=true;btn.textContent='저장 중...';
  const ok=await saveTodayMissions();
  btn.disabled=false;btn.textContent='저장하기 💾';
  if(ok){st.className='save-st ok';st.textContent='✓ 저장 완료!';toast('✅ '+selStudentName+' 미션 저장됨!');renderMissionStuSel();}
  else{st.className='save-st err';st.textContent='⚠️ 저장 실패';}
  setTimeout(()=>{if(st){st.textContent='';st.className='save-st';}},3000);
}

// ── 프리셋 ────────────────────────────────────────────────────────────────────
const DEF_PRESETS=['숙제 제출하기','숙제 오답하기'];
function loadPresets(){try{const s=localStorage.getItem('mogak_presets');return s?JSON.parse(s):[...DEF_PRESETS];}catch{return[...DEF_PRESETS];}}
function savePresets(arr){localStorage.setItem('mogak_presets',JSON.stringify(arr));}
function loadRecents(){try{return JSON.parse(localStorage.getItem('mogak_recent')||'[]');}catch{return[];}}
function addRecent(t){if(!t.trim())return;let r=loadRecents();r=[t,...r.filter(x=>x!==t)].slice(0,10);localStorage.setItem('mogak_recent',JSON.stringify(r));}

let _preOpen=false;
function togglePreEditor(){
  _preOpen=!_preOpen;
  const ed=document.getElementById('pre-editor');
  const btn=document.getElementById('pre-edit-btn');
  if(!ed||!btn)return;
  if(_preOpen){ed.classList.add('open');renderPeList();btn.textContent='✕ 닫기';}
  else{ed.classList.remove('open');btn.textContent='✏️ 편집';}
}
function renderPeList(){
  const el=document.getElementById('pe-list');if(!el)return;
  const P=loadPresets();
  el.innerHTML=P.length?P.map((p,i)=>`<div class="pe-row">
    <input class="pe-inp" value="${esc(p)}" onchange="(function(){const P=loadPresets();P[${i}]=this.value.trim();savePresets(P);refreshPreChips();}).call(this)"
           onblur="(function(){const P=loadPresets();if(!this.value.trim()){P.splice(${i},1);savePresets(P);renderPeList();refreshPreChips();}}).call(this)"/>
    <button class="btn btn-red btn-xs" onclick="(function(){const P=loadPresets();P.splice(${i},1);savePresets(P);renderPeList();refreshPreChips();})()">✕</button>
  </div>`).join(''):'<div style="color:var(--g400);font-size:13px">항목 없음</div>';
}
function addPresetItem(){
  const inp=document.getElementById('pe-add-inp');if(!inp)return;
  const v=inp.value.trim();if(!v){inp.focus();return;}
  const P=loadPresets();P.push(v);savePresets(P);inp.value='';renderPeList();refreshPreChips();inp.focus();
}
function refreshPreChips(){
  const el=document.getElementById('pre-chips');if(!el)return;
  el.innerHTML=loadPresets().map(p=>`<button class="pre-chip" data-p="${esc(p)}" onclick="addFromChip(this)">${esc(p)}</button>`).join('');
}

// ── 현황 보기 ─────────────────────────────────────────────────────────────────
async function loadOverview(){
  await loadTodayMissions();
  renderCatTabs('overview-cat-tabs');
  renderOverviewGrid();
}
function renderOverviewGrid(){
  const el=document.getElementById('ov-grid');if(!el)return;
  const list=getFilteredStudents(overviewCat);
  if(!list.length){el.innerHTML='<div style="color:var(--g400)">해당 카테고리에 학생이 없어요</div>';return;}
  const color=overviewCat!=='전체'?CAT_COLOR[overviewCat]:'var(--fire)';
  const soft=overviewCat!=='전체'?CAT_SOFT[overviewCat]:'var(--fire-soft)';
  el.innerHTML=list.map(s=>{
    const key=s.name+'_'+s.cat;
    const ms=ALL_MISSIONS[key]||[];
    const c=CAT_COLOR[s.cat]||'var(--fire)';
    const cs=CAT_SOFT[s.cat]||'var(--fire-soft)';
    const ptsHTML=s._kiosk&&s.points!=null?`<div class="ov-sub">🏅 ${s.points}P</div>`:'';
    return `<div class="ov-card">
      <div class="ov-head">
        <div class="ov-av" style="background:${cs};color:${c}">${s.name[0]}</div>
        <div>
          <div class="ov-name">${esc(s.name)}</div>
          <div class="ov-sub">${CAT_ICON[s.cat]||''} ${esc(s.cat)}</div>
          ${ptsHTML}
        </div>
      </div>
      <div class="ov-m-list">${ms.length
        ?ms.map(m=>`<div class="ov-m-item"><div><div>${esc(m.text)}</div>${m.hint?`<div class="ov-m-hint">${esc(m.hint)}</div>`:''}</div></div>`).join('')
        :'<div class="ov-empty">미션 없음</div>'
      }</div>
    </div>`;
  }).join('');
}

// ── 원생 관리 ─────────────────────────────────────────────────────────────────
function renderStudentsBody(){
  renderCatTabs('students-cat-tabs');
  const el=document.getElementById('students-body');
  if(!el) return;
  if(studentsCat==='전체'){
    el.innerHTML=CATS.map(c=>renderCatCard(c)).join('');
  } else {
    el.innerHTML=renderCatCard(studentsCat);
  }
}

function renderCatCard(cat) {
  const color=CAT_COLOR[cat];
  const soft=CAT_SOFT[cat];
  const isMath=cat.includes('수학');

  // 이 카테고리 학생들
  const mogakStus=MOGAK_STUDENTS.filter(s=>s.cat===cat);
  const kioskStus=isMath?KIOSK_STUDENTS.filter(s=>KIOSK_CATS[s.name]===cat):[];
  const unassigned=isMath?KIOSK_STUDENTS.filter(s=>!KIOSK_CATS[s.name]):[];

  const mogakChips=mogakStus.map(s=>`
    <div class="stu-chip" style="background:${soft};border:1.5px solid ${color}30">
      ${esc(s.name)}
      <span class="stu-chip-del" onclick="deleteMogakStu('${esc(s.name)}','${esc(cat)}')">✕</span>
    </div>`).join('');

  const kioskChips=kioskStus.map(s=>`
    <div class="stu-chip" style="background:${soft};border:1.5px solid ${color}30">
      🖥️ ${esc(s.name)} <span style="font-size:11px;color:${color}">🏅${s.points}P</span>
      <span class="stu-chip-del" style="color:var(--blue)" onclick="openKioskCatModal('${esc(s.name)}')">✏️</span>
    </div>`).join('');

  // 미배정 키오스크 학생 (수학 카테고리에만 표시)
  const unassignedHTML=isMath&&unassigned.length?`
    <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--g200)">
      <div style="font-size:11px;font-weight:700;color:var(--g400);margin-bottom:6px">🖥️ 카테고리 미배정 키오스크 학생</div>
      <div class="stu-chip-wrap">${unassigned.map(s=>`
        <div class="stu-chip" style="background:var(--g100);border:1.5px solid var(--g200)">
          ${esc(s.name)} <span style="font-size:11px;color:var(--g400)">🏅${s.points}P</span>
          <span class="stu-chip-del" style="color:var(--blue)" onclick="openKioskCatModal('${esc(s.name)}')">+ 배정</span>
        </div>`).join('')}
      </div>
    </div>`:'';

  return `<div style="background:var(--white);border-radius:16px;border:2px solid ${color}40;padding:18px 20px;margin-bottom:14px">
    <div style="font-size:15px;font-weight:900;color:${color};margin-bottom:12px">${CAT_ICON[cat]} ${cat}</div>
    <div class="stu-chip-wrap">
      ${mogakChips||''}
      ${kioskChips||''}
      ${!mogakChips&&!kioskChips?`<span style="font-size:13px;color:var(--g400)">원생이 없어요</span>`:''}
    </div>
    ${unassignedHTML}
    <div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--g200)">
      <input class="inp" id="add-stu-${cat}" placeholder="이름 입력..."
             onkeydown="if(event.key==='Enter')addMogakStu('${esc(cat)}')" style="flex:1"/>
      <button class="btn" style="background:${color};color:#fff" onclick="addMogakStu('${esc(cat)}')">+ 추가</button>
    </div>
  </div>`;
}

async function addMogakStu(cat){
  const inp=document.getElementById('add-stu-'+cat);if(!inp)return;
  const name=inp.value.trim();if(!name){inp.focus();return;}
  const exists=MOGAK_STUDENTS.some(s=>s.name===name&&s.cat===cat)
    ||(cat.includes('수학')&&KIOSK_STUDENTS.some(s=>s.name===name&&KIOSK_CATS[s.name]===cat));
  if(exists){toast('⚠️ 이미 있는 학생이에요');return;}
  MOGAK_STUDENTS.push({name,cat});
  inp.value='';
  await saveMogakStudents();
  await loadStudents();
  toast('✅ '+name+' 추가됨!');
}

async function deleteMogakStu(name,cat){
  if(!confirm(name+' 학생을 '+cat+' 목록에서 삭제할까요?'))return;
  MOGAK_STUDENTS=MOGAK_STUDENTS.filter(s=>!(s.name===name&&s.cat===cat));
  delete ALL_MISSIONS[name+'_'+cat];
  await saveMogakStudents();
  await saveTodayMissions();
  if(selStudent===name+'_'+cat){selStudent=null;renderEdBody();}
  await loadStudents();
  toast('🗑️ '+name+' 삭제됨');
}

// ── 키오스크 학생 카테고리 모달 ───────────────────────────────────────────────
function openKioskCatModal(name){
  _kioskCatTarget=name;
  document.getElementById('kiosk-cat-name').textContent=name;
  document.getElementById('kiosk-cat-sel').value=KIOSK_CATS[name]||'';
  document.getElementById('kiosk-cat-modal').classList.add('open');
}
function closeKioskCatModal(){
  document.getElementById('kiosk-cat-modal').classList.remove('open');
  _kioskCatTarget=null;
}
async function saveKioskCat(){
  if(!_kioskCatTarget)return;
  const cat=document.getElementById('kiosk-cat-sel').value;
  if(cat) KIOSK_CATS[_kioskCatTarget]=cat;
  else delete KIOSK_CATS[_kioskCatTarget];
  await saveKioskCats();
  closeKioskCatModal();
  await loadStudents();
  toast('✅ '+_kioskCatTarget+' 카테고리 설정됨!');
}

// ── 링크 생성 ─────────────────────────────────────────────────────────────────
function renderLinks(){
  renderCatTabs('links-cat-tabs');
  const el=document.getElementById('link-list');if(!el)return;
  const list=getFilteredStudents(linksCat);
  if(!list.length){el.innerHTML='<div style="color:var(--g400)">해당 카테고리에 학생이 없어요</div>';return;}

  // 카테고리별 그룹핑
  const groups={};
  CATS.forEach(c=>{groups[c]=[];});
  list.forEach(s=>{if(s.cat&&groups[s.cat])groups[s.cat].push(s);});

  const catsToShow=linksCat==='전체'?CATS:[linksCat];
  el.innerHTML=catsToShow.map(cat=>{
    const stus=groups[cat]||[];
    if(!stus.length) return '';
    return `<div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:900;color:${CAT_COLOR[cat]};letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase">${CAT_ICON[cat]} ${cat}</div>
      ${stus.map(s=>{
        const url=MOGAKGONG_URL+'?name='+encodeURIComponent(s.name)+'&class='+encodeURIComponent(s.cat);
        const lid='lcb-'+s.name+'-'+s.cat;
        return `<div class="link-card">
          <div>
            <div class="link-name">${esc(s.name)}</div>
            <div class="link-sub">${s._kiosk?'키오스크':'모각공'}</div>
          </div>
          <div class="link-url">${url}</div>
          <button class="link-copy" id="${esc(lid)}"
            onclick="copyLink(${JSON.stringify(lid)},${JSON.stringify(url)},${JSON.stringify(s.name+' ('+s.cat+')')})">📋 복사</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function copyLink(id,url,label){
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById(id);
    if(btn){btn.textContent='✓ 복사됨!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 복사';btn.classList.remove('copied');},2000);}
    toast('🔗 '+label+' 복사됨!');
  });
}

// ── 포인트 내역 ───────────────────────────────────────────────────────────────
async function renderLogTable(){
  const tbody=document.getElementById('log-body');if(!tbody)return;
  const rows=[];
  const mathStus=KIOSK_STUDENTS.slice(0,7);
  for(const s of mathStus){
    try{const d=await api('/api/students/'+s.id);if(d.success)d.history.forEach(h=>rows.push({name:s.name,...h}));}catch{}
  }
  rows.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  tbody.innerHTML=rows.slice(0,40).map(r=>`<tr>
    <td style="font-weight:700">${esc(r.name)}</td>
    <td><span class="${r.delta>=0?'log-pos':'log-neg'}">${r.delta>=0?'+':''}${r.delta}</span></td>
    <td style="font-size:12px;color:var(--g600);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.reason)}</td>
    <td><span class="log-badge ${r.category}">${{learn:'학습',fine:'벌금',shop:'상점',admin:'조정'}[r.category]||r.category}</span></td>
    <td style="font-size:11px;color:var(--g400)">${(r.created_at||'').slice(0,16).replace('T',' ')}</td>
  </tr>`).join('');
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['missions','overview','students','links'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
  if(tab==='overview'){renderCatTabs('overview-cat-tabs');loadOverview();}
  if(tab==='students') loadStudents();
  if(tab==='links'){renderCatTabs('links-cat-tabs');renderLinks();}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}

// ── AUTO LOGIN ────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const saved=sessionStorage.getItem('mogak_pw');
  if(saved){PW=saved;showApp();}
});
</script>
