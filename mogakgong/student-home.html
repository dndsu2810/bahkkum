<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>모각공 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0C0806;color:#F5EDE4;font-family:'Noto Sans KR',sans-serif;user-select:none;-webkit-user-select:none}

.scr{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s;will-change:transform}
.scr.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.scr.hidden-left{transform:translateX(-100%);opacity:0;pointer-events:none}

/* HOME */
#home{background:#0C0806}
.home-hdr{padding:28px 28px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.home-title{font-size:26px;font-weight:900;letter-spacing:-.02em}
.home-title span{color:#FB923C}
.home-date{font-size:13px;color:rgba(245,237,228,.4)}
.home-clock{font-size:20px;font-weight:900;color:rgba(245,237,228,.7)}
.kiosk-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;
  border-radius:12px;border:1.5px solid rgba(251,146,60,.4);
  background:rgba(251,146,60,.1);color:#FB923C;
  font-size:13px;font-weight:900;cursor:pointer;text-decoration:none;
  transition:all .15s;white-space:nowrap}
.kiosk-btn:active{transform:scale(.95);background:rgba(251,146,60,.2)}
.search-wrap{padding:0 24px 14px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:18px;padding:13px 18px}
.search-icon{font-size:16px;opacity:.5}
.search-inp{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:16px;color:#F5EDE4;caret-color:#FB923C}
.search-inp::placeholder{color:rgba(245,237,228,.3)}
.grid-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 24px 28px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.grid-wrap::-webkit-scrollbar{display:none}
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}

/* STUDENT CARD */
.stu-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.09);border-radius:18px;
  padding:22px 14px 18px;display:flex;flex-direction:column;align-items:center;gap:9px;
  cursor:pointer;transition:transform .18s,background .18s;position:relative;overflow:hidden;min-height:150px;justify-content:center}
.stu-card:active{transform:scale(.96);background:rgba(251,146,60,.1)}
.sc-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;flex-shrink:0;border:2px solid rgba(255,255,255,.1);overflow:hidden}
.sc-av img{width:100%;height:100%;object-fit:cover}
.sc-name{font-size:15px;font-weight:900;text-align:center}
.sc-pts{font-size:12px;font-weight:700;color:rgba(245,237,228,.45)}
.sc-pts.has-pts{color:#FB923C}
.fine-dot{position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%;background:#F87171}
.loading-grid{display:flex;align-items:center;justify-content:center;height:200px;color:rgba(245,237,228,.3);font-size:14px}

/* DETAIL */
#detail{background:#0C0806}
.detail-hdr{padding:16px 24px 0;display:flex;align-items:center;gap:14px;flex-shrink:0}
.back-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .15s;flex-shrink:0}
.back-btn:active{transform:scale(.92)}
.timer-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#FB923C,#FDE68A);border-radius:2px;transition:width 1s linear}
.timer-txt{font-size:12px;color:rgba(245,237,228,.4);font-weight:700;flex-shrink:0}
.detail-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 24px 40px}
.detail-scroll::-webkit-scrollbar{display:none}

/* PROFILE HERO */
.hero{display:flex;flex-direction:column;align-items:center;padding:28px 0 22px;gap:14px}
.hero-av{width:90px;height:90px;border-radius:50%;border:3px solid rgba(251,146,60,.4);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;flex-shrink:0;position:relative}
.hero-av img{width:100%;height:100%;object-fit:cover}
.hero-av::after{content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(from 0deg,#FB923C,#FDE68A,#FB923C);z-index:-1;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-av-inner{position:relative;width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:#1E1410;z-index:1;display:flex;align-items:center;justify-content:center}
.hero-name{font-size:26px;font-weight:900;letter-spacing:-.02em}
.hero-cat{font-size:12px;font-weight:700;padding:4px 13px;border-radius:20px;margin-top:-4px}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.09);border-radius:14px;padding:14px 10px;text-align:center}
.stat-val{font-size:22px;font-weight:900;line-height:1}
.stat-lbl{font-size:10px;color:rgba(245,237,228,.4);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.stat-card.pts{border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.08)}
.stat-card.pts .stat-val{color:#FB923C}
.stat-card.fine-pt{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}
.stat-card.fine-pt .stat-val{color:#F87171}
.stat-card.fine-t{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.08)}
.stat-card.fine-t .stat-val{color:#FBB91C}

/* SECTION */
.sec-lbl{font-size:11px;font-weight:700;color:rgba(245,237,228,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;margin-top:18px}

/* MISSIONS */
.mission-list{display:flex;flex-direction:column;gap:7px}
.m-item{display:flex;align-items:center;gap:13px;padding:13px 14px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);border-radius:13px;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.m-item:active{transform:scale(.98)}
.m-item.done{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2)}
.m-check{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}
.m-item.done .m-check{background:#22C55E;border-color:#22C55E;color:#fff}
.m-text{font-size:14px;font-weight:700;line-height:1.3}
.m-item.done .m-text{text-decoration:line-through;color:rgba(245,237,228,.4)}
.m-hint{font-size:11px;color:rgba(245,237,228,.35);margin-top:2px}
.no-mission{text-align:center;padding:18px;color:rgba(245,237,228,.3);font-size:13px;
  background:rgba(255,255,255,.03);border-radius:12px;border:1px dashed rgba(255,255,255,.1)}

/* NOTIFY BUTTON */
.notify-wrap{margin-top:12px}
.notify-btn{width:100%;padding:17px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:900;
  background:linear-gradient(135deg,#FB923C,#FDE68A);color:#0C0806;
  box-shadow:0 8px 28px rgba(251,146,60,.45);transition:transform .15s,opacity .15s}
.notify-btn:active{transform:scale(.97)}
.notify-btn:disabled{background:rgba(255,255,255,.08);color:rgba(245,237,228,.35);
  box-shadow:none;cursor:not-allowed;font-size:13px}
.notify-sent{width:100%;padding:16px;border-radius:16px;
  background:rgba(52,211,153,.1);border:1.5px solid rgba(52,211,153,.3);
  color:#34D399;font-size:14px;font-weight:900;text-align:center}
.progress-wrap{margin-top:10px;display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#34D399;border-radius:2px;transition:width .4s}
.progress-txt{font-size:12px;font-weight:700;color:rgba(245,237,228,.5);white-space:nowrap}

/* HISTORY */
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{display:flex;align-items:center;gap:11px;padding:10px 13px;background:rgba(255,255,255,.04);border-radius:11px}
.hist-delta{font-size:13px;font-weight:900;min-width:44px;text-align:right}
.hist-delta.pos{color:#34D399}.hist-delta.neg{color:#F87171}
.hist-reason{flex:1;font-size:12px;color:rgba(245,237,228,.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-time{font-size:10px;color:rgba(245,237,228,.3);white-space:nowrap}
.no-hist{text-align:center;padding:14px;color:rgba(245,237,228,.3);font-size:12px}

/* 연장 팝업 */
.extend-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:44px;
  opacity:0;pointer-events:none;transition:opacity .25s}
.extend-overlay.show{opacity:1;pointer-events:all}
.extend-box{background:#1E1410;border:1.5px solid rgba(255,255,255,.12);border-radius:26px;
  padding:26px 26px 22px;width:min(380px,88vw);text-align:center;
  transform:translateY(40px);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.extend-overlay.show .extend-box{transform:translateY(0)}
.extend-title{font-size:18px;font-weight:900;margin-bottom:5px}
.extend-sub{font-size:13px;color:rgba(245,237,228,.45);margin-bottom:20px;line-height:1.5}
.extend-ring{position:relative;width:50px;height:50px;margin:0 auto 20px}
.extend-ring svg{transform:rotate(-90deg)}
.extend-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#FB923C}
.extend-btns{display:flex;gap:9px}
.btn-extend{flex:1;padding:15px;border-radius:15px;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:900;transition:all .15s}
.btn-extend-yes{background:linear-gradient(135deg,#FB923C,#FDE68A);color:#0C0806;box-shadow:0 8px 24px rgba(251,146,60,.4)}
.btn-extend-yes:active{transform:scale(.96)}
.btn-extend-no{background:rgba(255,255,255,.08);color:rgba(245,237,228,.6);border:1px solid rgba(255,255,255,.12)}

/* 로딩 */
.loading-scr{position:fixed;inset:0;background:#0C0806;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:100;transition:opacity .5s}
.loading-scr.out{opacity:0;pointer-events:none}
.loading-fire{font-size:52px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.loading-txt{font-size:14px;color:rgba(245,237,228,.4);font-weight:700}
</style>
</head>
<body>

<div class="loading-scr" id="loading">
  <div class="loading-fire">🔥</div>
  <div class="loading-txt">불러오는 중...</div>
</div>

<div class="scr" id="home">
  <div class="home-hdr">
    <div>
      <div class="home-title">모각공 <span>🔥</span></div>
      <div class="home-date" id="home-date"></div>
    </div>
    <div class="home-clock" id="home-clock"></div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search-inp" placeholder="이름 검색..." oninput="filterStudents(this.value)" autocomplete="off"/>
    </div>
  </div>
  <div class="grid-wrap">
    <div class="stu-grid" id="stu-grid"><div class="loading-grid">불러오는 중...</div></div>
  </div>
</div>

<div class="scr hidden-right" id="detail">
  <div class="detail-hdr">
    <div class="back-btn" onclick="goHome()">←</div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="timer-txt" id="timer-txt">30초</div>
  </div>
  <div class="detail-scroll" id="detail-scroll"></div>

  <!-- 연장 팝업 -->
  <div class="extend-overlay" id="extend-overlay">
    <div class="extend-box">
      <div class="extend-title">아직 보고 계신가요?</div>
      <div class="extend-sub">곧 홈 화면으로 돌아가요</div>
      <div class="extend-ring">
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="21" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/>
          <circle cx="25" cy="25" r="21" fill="none" stroke="#FB923C" stroke-width="4"
            stroke-dasharray="131.9" id="ring-dash" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="extend-ring-num" id="ring-num">5</div>
      </div>
      <div class="extend-btns">
        <button class="btn-extend btn-extend-no" onclick="confirmGoHome()">홈으로</button>
        <button class="btn-extend btn-extend-yes" onclick="extendTime()">🔥 30초 연장</button>
      </div>
    </div>
  </div>
</div>

<script>
const KIOSK = 'https://bakuum-kiosk.pages.dev';
let STUDENTS = [];
let _timerSec = 30, _timerInterval = null;
let _extending = false, _extSec = 5, _extInterval = null;
const RING_LEN = 131.9;

const CAT_COLOR = {'초등수학':'#34D399','중고등수학':'#FB923C','초등영어':'#60A5FA','중고등영어':'#A78BFA'};
const CAT_BG = {'초등수학':'rgba(52,211,153,.15)','중고등수학':'rgba(251,146,60,.15)','초등영어':'rgba(96,165,250,.15)','중고등영어':'rgba(167,139,250,.15)'};
const CAT_ICON = {'초등수학':'📐','중고등수학':'📏','초등영어':'📘','중고등영어':'📗'};

// ── 초기화 ─────────────────────────────────────────────────────────────────────
async function init() {
  startClock();
  try {
    const stuRes = await fetch(KIOSK + '/api/students');
    const stuData = await stuRes.json();
    const cfgRes = await fetch(KIOSK + '/api/config');
    const cfg = await cfgRes.json();
    const KIOSK_CATS = cfg.kiosk_cats || {};
    if (stuData.success) {
      STUDENTS = stuData.students.filter(s => KIOSK_CATS[s.name]);
    }
    renderGrid(STUDENTS, KIOSK_CATS);
  } catch(e) { console.error(e); }
  setTimeout(() => document.getElementById('loading').classList.add('out'), 400);
}

// ── 시계 ───────────────────────────────────────────────────────────────────────
function startClock() {
  const dateEl = document.getElementById('home-date');
  const clockEl = document.getElementById('home-clock');
  const days = ['일','월','화','수','목','금','토'];
  function tick() {
    const d = new Date();
    dateEl.textContent = d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';
    clockEl.textContent = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  tick(); setInterval(tick, 10000);
}

// ── 그리드 ─────────────────────────────────────────────────────────────────────
function renderGrid(list, KIOSK_CATS) {
  const el = document.getElementById('stu-grid');
  if (!list.length) { el.innerHTML = '<div class="loading-grid">등록된 학생이 없어요</div>'; return; }
  el.innerHTML = list.map(s => {
    const cat = KIOSK_CATS ? (KIOSK_CATS[s.name] || '') : '';
    const color = CAT_COLOR[cat] || '#FB923C';
    const avContent = s.photo_url
      ? `<img src="${esc(s.photo_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
      : esc(s.name[0]);
    const avStyle = s.photo_url ? '' : `background:linear-gradient(135deg,${color}22,${color}44);color:${color}`;
    const fineHTML = s.fine_count > 0 ? '<div class="fine-dot"></div>' : '';
    return `<div class="stu-card" onclick="openDetail(${s.id})">
      ${fineHTML}
      <div class="sc-av" style="${avStyle}">${avContent}</div>
      <div class="sc-name">${esc(s.name)}</div>
      <div class="sc-pts ${s.points>0?'has-pts':''}">🏅 ${s.points}P</div>
    </div>`;
  }).join('');
}

function filterStudents(q) {
  const kw = q.trim();
  document.querySelectorAll('.stu-card').forEach(c => {
    c.style.display = kw && !c.querySelector('.sc-name').textContent.includes(kw) ? 'none' : '';
  });
}

// ── 학생 상세 ─────────────────────────────────────────────────────────────────
async function openDetail(id) {
  const s = STUDENTS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('home').classList.add('hidden-left');
  document.getElementById('detail').classList.remove('hidden-right');
  document.getElementById('detail-scroll').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:rgba(245,237,228,.3)">불러오는 중...</div>';
  document.getElementById('detail-scroll').scrollTop = 0;
  document.getElementById('search-inp').value = '';
  filterStudents('');

  // ── 항상 최신 데이터 fetch ───────────────────────────────────────────────────
  let cfg = {}, history = [], fineStats = {fine_point:0,fine_time:0,fine_sheet:0};
  try {
    const [cfgRes, stuRes] = await Promise.all([
      fetch(KIOSK + '/api/config'),
      fetch(KIOSK + '/api/students/' + id)
    ]);
    cfg = await cfgRes.json();
    const stuData = await stuRes.json();
    if (stuData.success) {
      history = stuData.history || [];
      fineStats = stuData.fineStats || fineStats;
      // 포인트 최신화
      const idx = STUDENTS.findIndex(x => x.id === id);
      if (idx >= 0) STUDENTS[idx].points = stuData.student?.points ?? s.points;
    }
  } catch(e) {}

  const KIOSK_CATS = cfg.kiosk_cats || {};
  const cat = KIOSK_CATS[s.name] || '';
  const color = CAT_COLOR[cat] || '#FB923C';
  const bg = CAT_BG[cat] || 'rgba(251,146,60,.15)';

  const d = new Date();
  const todayKey = 'mogakgong_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
  const doneKey  = 'mogakgong_done_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
  const missionKey = s.name + '_' + cat;

  const missions   = cfg[todayKey]?.[missionKey] || [];
  const doneMask   = cfg[doneKey]?.[missionKey]  || [];
  const doneCnt    = doneMask.filter(Boolean).length;
  const allDone    = missions.length > 0 && doneCnt === missions.length;

  const submitKey = 'mogak_submitted_' + missionKey + '_' + todayKey;
  // 서버 pending 상태로 다른 기기 제출 여부 확인
  const serverPending = cfg['mogakgong_pending']?.[missionKey];
  const serverAlreadySent = serverPending && serverPending.status === 'pending';
  if (serverAlreadySent && !localStorage.getItem(submitKey)) {
    localStorage.setItem(submitKey, '1'); // 동기화
  }
  const alreadySent = localStorage.getItem(submitKey) === '1' || serverAlreadySent;

  const avContent = s.photo_url
    ? `<div class="hero-av-inner"><img src="${esc(s.photo_url)}" style="width:100%;height:100%;object-fit:cover"/></div>`
    : `<div class="hero-av-inner" style="font-size:32px;font-weight:900;color:${color}">${esc(s.name[0])}</div>`;

  const missionsHTML = missions.length
    ? missions.map((m,i) => {
        const done = doneMask[i] || false;
        return `<div class="m-item ${done?'done':''}" onclick="toggleMission(this,${id},'${esc(missionKey)}')" data-idx="${i}">
          <div class="m-check">${done?'✓':''}</div>
          <div>
            <div class="m-text">${esc(m.text)}</div>
            ${m.hint?`<div class="m-hint">${esc(m.hint)}</div>`:''}
          </div>
        </div>`;
      }).join('')
    : '<div class="no-mission">오늘 미션이 아직 없어요</div>';

  const pct = missions.length > 0 ? Math.round(doneCnt/missions.length*100) : 0;
  const progressHTML = missions.length > 0 ? `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:${pct}%"></div></div>
      <div class="progress-txt" id="prog-txt">${doneCnt}/${missions.length}</div>
    </div>` : '';

  // 알림 버튼
  let notifyHTML = '';
  if (missions.length > 0) {
    if (alreadySent) {
      notifyHTML = '<div class="notify-sent">✅ 선생님께 완료 알림을 보냈어요!</div>';
    } else if (allDone) {
      notifyHTML = `<button class="notify-btn" id="notify-btn"
        onclick="notifyTeacher(${id},'${esc(missionKey)}','${esc(s.name)}')">
        🔥 선생님께 완료 알리기</button>`;
    } else {
      notifyHTML = `<button class="notify-btn" id="notify-btn" disabled>
        미션을 모두 완료하면 알릴 수 있어요 (${doneCnt}/${missions.length})</button>`;
    }
  }

  const fineCards = [
    fineStats.fine_point > 0 ? `<div class="stat-card fine-pt"><div class="stat-val">${fineStats.fine_point}</div><div class="stat-lbl">💸 벌금P</div></div>` : '',
    fineStats.fine_time  > 0 ? `<div class="stat-card fine-t"><div class="stat-val">${fineStats.fine_time}</div><div class="stat-lbl">⏰ 벌금분</div></div>` : '',
  ].filter(Boolean).join('');
  const statCount = 1 + (fineStats.fine_point>0?1:0) + (fineStats.fine_time>0?1:0);
  const latestPts = STUDENTS.find(x=>x.id===id)?.points ?? s.points;

  const histHTML = history.length
    ? history.slice(0,12).map(h=>{
        const t = (h.created_at||'').slice(5,16).replace('T',' ');
        return `<div class="hist-item">
          <div class="hist-delta ${h.delta>=0?'pos':'neg'}">${h.delta>=0?'+':''}${h.delta}P</div>
          <div class="hist-reason">${esc(h.reason||'-')}</div>
          <div class="hist-time">${t}</div>
        </div>`;
      }).join('')
    : '<div class="no-hist">포인트 내역이 없어요</div>';

  document.getElementById('detail-scroll').innerHTML = `
    <div class="hero">
      <div class="hero-av">${avContent}</div>
      <div class="hero-name">${esc(s.name)}</div>
      ${cat?`<div class="hero-cat" style="background:${bg};color:${color}">${CAT_ICON[cat]||''} ${esc(cat)}</div>`:''}
    </div>
    <div class="stat-row" style="${statCount===1?'grid-template-columns:1fr 1fr 1fr':''}">
      <div class="stat-card pts"><div class="stat-val">${latestPts}</div><div class="stat-lbl">🏅 포인트</div></div>
      ${fineCards}
      ${statCount<3?`<div class="stat-card"><div class="stat-val" style="font-size:16px;color:rgba(245,237,228,.3)">${history.length}</div><div class="stat-lbl">📋 내역</div></div>`:''}
    </div>
    <div class="sec-lbl">오늘의 미션</div>
    <div class="mission-list" id="mission-list-wrap">${missionsHTML}</div>
    ${progressHTML}
    <div class="notify-wrap">${notifyHTML}</div>
    <div class="sec-lbl" style="margin-top:22px">포인트 내역</div>
    <div class="hist-list">${histHTML}</div>
  `;

  startTimer();
}

// ── 미션 체크 ─────────────────────────────────────────────────────────────────
async function toggleMission(el, studentId, missionKey) {
  resetTimer();
  const idx = parseInt(el.getAttribute('data-idx'));
  const newDone = !el.classList.contains('done');

  // UI 즉시 반영
  el.classList.toggle('done', newDone);
  const chk = el.querySelector('.m-check');
  if (chk) chk.textContent = newDone ? '✓' : '';

  // done 배열 재구성
  const allItems = document.querySelectorAll('#mission-list-wrap .m-item');
  const doneArr = Array.from(allItems).map(i => i.classList.contains('done'));
  const doneCnt = doneArr.filter(Boolean).length;
  const total = allItems.length;
  const allDone = doneCnt === total && total > 0;

  // 진행률 업데이트
  const pct = total > 0 ? Math.round(doneCnt/total*100) : 0;
  const fill = document.getElementById('prog-fill');
  const txt  = document.getElementById('prog-txt');
  if (fill) fill.style.width = pct + '%';
  if (txt)  txt.textContent = doneCnt + '/' + total;

  // 알림 버튼 업데이트
  const notifyWrap = document.querySelector('.notify-wrap');
  const d2 = new Date();
  const submitKey = 'mogak_submitted_' + missionKey + '_mogakgong_' + d2.getFullYear() + '_' + (d2.getMonth()+1) + '_' + d2.getDate();
  const alreadySent = localStorage.getItem(submitKey) === '1';
  if (notifyWrap && !alreadySent) {
    if (allDone) {
      notifyWrap.innerHTML = `<button class="notify-btn" id="notify-btn"
        onclick="notifyTeacher(${studentId},'${missionKey}','')">
        🔥 선생님께 완료 알리기</button>`;
    } else {
      notifyWrap.innerHTML = `<button class="notify-btn" id="notify-btn" disabled>
        미션을 모두 완료하면 알릴 수 있어요 (${doneCnt}/${total})</button>`;
    }
  }

  // 서버 저장
  try {
    const d = new Date();
    const dateKey = 'mogakgong_done_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
    await fetch(KIOSK + '/api/mogak/done', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ dateKey, studentKey: missionKey, done: doneArr })
    });
  } catch(e) { console.error('done 저장 오류:', e); }
}

// ── 선생님께 알리기 ───────────────────────────────────────────────────────────
async function notifyTeacher(studentId, missionKey, studentName) {
  const btn = document.getElementById('notify-btn');
  if (btn) { btn.disabled = true; btn.textContent = '전송 중... ⏳'; }
  resetTimer();

  try {
    const d = new Date();
    const todayKey = 'mogakgong_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
    const doneKey  = 'mogakgong_done_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
    const submitKey = 'mogak_submitted_' + missionKey + '_' + todayKey;

    // 최신 config로 completed missions 확인
    const cfgRes = await fetch(KIOSK + '/api/config');
    const cfg = await cfgRes.json();
    const missions  = cfg[todayKey]?.[missionKey] || [];
    const doneArr   = cfg[doneKey]?.[missionKey]  || [];

    // 화면에 체크된 것도 반영 (서버보다 화면이 최신일 수 있음)
    const allItems = document.querySelectorAll('#mission-list-wrap .m-item');
    const screenDone = Array.from(allItems).map(i => i.classList.contains('done'));
    const finalDone = missions.map((_,i) => screenDone[i] || doneArr[i] || false);
    const completed = missions.filter((_,i) => finalDone[i]);

    if (completed.length === 0) {
      if (btn) { btn.disabled = false; btn.textContent = '🔥 선생님께 완료 알리기'; }
      alert('완료된 미션이 없어요.');
      return;
    }

    // 학생 이름 추출 (missionKey = '이름_카테고리')
    const parts = missionKey.split('_');
    const name = studentName || parts[0] || STUDENTS.find(s=>s.id===studentId)?.name || '학생';
    const cat  = parts.slice(1).join('_');

    // 전용 알림 엔드포인트 사용 (객체/배열 혼용 문제 방지)
    const res = await fetch(KIOSK + '/api/mogak/notify', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ studentKey: missionKey, name, cat, missions: completed, studentId })
    });

    let result = { success: false, error: '응답 없음' };
    try { result = await res.json(); } catch(e) { result = { success: false, error: '응답 파싱 실패' }; }
    if (result.success) {
      localStorage.setItem(submitKey, '1');
      const notifyWrap = document.querySelector('.notify-wrap');
      if (notifyWrap) notifyWrap.innerHTML = '<div class="notify-sent">✅ 선생님께 완료 알림을 보냈어요!</div>';
    } else {
      if (btn) { btn.disabled = false; btn.textContent = '🔥 선생님께 완료 알리기'; }
      alert('전송 실패: ' + (result.error || '다시 시도해주세요'));
    }
  } catch(e) {
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = '🔥 선생님께 완료 알리기'; }
    alert('네트워크 오류. 다시 시도해주세요.');
  }
}

// ── 타이머 ────────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(_timerInterval); _extending = false; hideExtend();
  _timerSec = 30; updateTimerUI();
  _timerInterval = setInterval(() => {
    if (_extending) return;
    _timerSec--;
    updateTimerUI();
    if (_timerSec === 5) showExtend();
    if (_timerSec <= 0) confirmGoHome();
  }, 1000);
}
function updateTimerUI() {
  const fill = document.getElementById('timer-fill');
  const txt  = document.getElementById('timer-txt');
  if (fill) fill.style.width = (_timerSec/30*100)+'%';
  if (txt)  { txt.textContent = _timerSec+'초'; txt.style.color = _timerSec<=5?'#F87171':'rgba(245,237,228,.4)'; }
}
function resetTimer() { if (!_extending) { _timerSec = 30; updateTimerUI(); } }
function showExtend() {
  _extending = true; _extSec = 5;
  document.getElementById('extend-overlay').classList.add('show');
  updateExtUI();
  _extInterval = setInterval(() => { _extSec--; updateExtUI(); if (_extSec<=0) confirmGoHome(); }, 1000);
}
function hideExtend() {
  clearInterval(_extInterval);
  document.getElementById('extend-overlay')?.classList.remove('show');
}
function updateExtUI() {
  const num  = document.getElementById('ring-num');
  const dash = document.getElementById('ring-dash');
  if (num)  num.textContent = _extSec;
  if (dash) { dash.style.strokeDashoffset = RING_LEN*(1-_extSec/5); dash.style.stroke = _extSec<=2?'#F87171':'#FB923C'; }
}
function extendTime() { hideExtend(); _extending = false; _timerSec = 30; updateTimerUI(); }
function confirmGoHome() { clearInterval(_extInterval); hideExtend(); goHome(); }

document.getElementById('detail').addEventListener('touchstart', resetTimer, {passive:true});

function goHome() {
  clearInterval(_timerInterval); clearInterval(_extInterval); hideExtend(); _extending = false;
  document.getElementById('detail').classList.add('hidden-right');
  document.getElementById('home').classList.remove('hidden-left');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') goHome(); });

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>
