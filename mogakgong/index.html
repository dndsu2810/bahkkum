<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모각공 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fire:#FE5F3C;--fire2:#FF9A2E;--fire3:#FFD060;
  --bg:#0E0A08;--surface:#1C1410;--surface2:#261A12;
  --log:#5C3418;--logd:#3A1F0A;
  --text:#F8EDE4;--muted:#8A7060;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding-bottom:80px;overflow-x:hidden;
}
.header{
  width:100%;max-width:440px;
  padding:24px 20px 0;
  display:flex;justify-content:space-between;align-items:center;
}
.student-name{font-size:20px;font-weight:900;color:var(--text)}
.student-name span{color:var(--fire)}
.date-badge{
  font-size:11px;color:var(--muted);
  background:var(--surface);border-radius:20px;
  padding:6px 12px;border:1px solid rgba(255,255,255,0.06);
}
.sync-badge{
  font-size:10px;font-weight:700;
  background:rgba(34,197,94,.15);color:#22C55E;
  border:1px solid rgba(34,197,94,.3);border-radius:20px;
  padding:4px 10px;display:none;
  animation:sync-in .4s ease;
}
@keyframes sync-in{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.sync-badge.show{display:inline-block}
.stage{
  width:100%;max-width:440px;
  padding:20px 20px 0;
  display:flex;flex-direction:column;align-items:center;
}
.status-bubble{
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;
  padding:8px 20px;
  font-size:13px;font-weight:700;
  color:var(--muted);
  margin-bottom:16px;
  transition:color .4s,border-color .4s;
  text-align:center;
}
.status-bubble.alive{color:var(--fire);border-color:rgba(254,95,60,.35)}
.canvas-wrap{
  position:relative;
  width:260px;height:260px;
  display:flex;align-items:flex-end;justify-content:center;
}
.ground-glow{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  width:120px;height:18px;border-radius:50%;
  background:var(--fire);filter:blur(20px);
  opacity:0.03;
  transition:opacity 1s,width 1s;
}
.log-pile{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:160px;height:40px;
}
.log-stick{
  position:absolute;height:16px;border-radius:8px;
  background:var(--log);border-bottom:3px solid var(--logd);
  opacity:0;transform:scale(0.5) translateY(10px);
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
}
.log-stick.show{opacity:1;transform:scale(1) translateY(0)}
.log-a{width:120px;bottom:2px;left:20px}
.log-b{width:100px;bottom:2px;left:30px;transform-origin:center bottom}
.log-c{width:70px;bottom:18px;left:45px}
.log-b.show{transform:rotate(12deg) scale(1) translateY(0)!important}
.fly-log{
  position:fixed;width:44px;height:16px;border-radius:8px;
  background:var(--log);border-bottom:3px solid var(--logd);
  pointer-events:none;z-index:200;
  display:none;
}
.fire-char{
  position:absolute;bottom:28px;left:50%;
  transform:translateX(-50%) scale(0.18);
  transform-origin:bottom center;
  transition:transform .7s cubic-bezier(.34,1.56,.64,1);
}
.fire-char.level-1{transform:translateX(-50%) scale(0.38)}
.fire-char.level-2{transform:translateX(-50%) scale(0.52)}
.fire-char.level-3{transform:translateX(-50%) scale(0.65)}
.fire-char.level-4{transform:translateX(-50%) scale(0.78)}
.fire-char.level-5{transform:translateX(-50%) scale(0.92)}
.char-body{animation:wobble 2s ease-in-out infinite}
@keyframes wobble{
  0%,100%{transform:scaleX(1) scaleY(1) rotate(0deg)}
  25%{transform:scaleX(.96) scaleY(1.04) rotate(-1.5deg)}
  50%{transform:scaleX(1.04) scaleY(.97) rotate(1deg)}
  75%{transform:scaleX(.97) scaleY(1.03) rotate(-.5deg)}
}
.fire-char.dim .fm{fill:#3A1A0A!important}
.fire-char.dim .fmid{fill:#2A1208!important}
.fire-char.dim .fcore{fill:#1E0D06!important}
.fire-char.dim .ew{fill:#3A1A0A!important}
.fire-char.dim .ep{fill:#1E0D06!important}
.fire-char.dim .cheek{opacity:0!important}
.fire-char.dim .mhappy{display:none!important}
.fire-char.dim .msad{display:block!important}
.fire-char.dim .char-body{animation:dim-wobble 4s ease-in-out infinite}
@keyframes dim-wobble{
  0%,100%{transform:scaleX(1) scaleY(1)}
  50%{transform:scaleX(1) scaleY(.95)}
}
.tip{transform-origin:90px 50px;animation:tip-dance 1.4s ease-in-out infinite alternate}
.tip:nth-child(2){transform-origin:68px 60px;animation-delay:.2s;animation-duration:1.1s}
.tip:nth-child(3){transform-origin:112px 60px;animation-delay:.4s;animation-duration:1.7s}
@keyframes tip-dance{
  0%{transform:scaleX(1) scaleY(1) rotate(-2deg)}
  100%{transform:scaleX(.88) scaleY(1.1) rotate(3deg)}
}
.fire-char.eating .char-body{animation:eat-bounce .55s cubic-bezier(.36,.07,.19,.97)}
@keyframes eat-bounce{
  0%{transform:scale(1)}
  30%{transform:scale(1.2) rotate(-4deg)}
  60%{transform:scale(.93) rotate(3deg)}
  100%{transform:scale(1) rotate(0)}
}
.particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:p-up 1.2s ease-out forwards;
}
@keyframes p-up{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}
}
.star-burst{
  position:fixed;pointer-events:none;z-index:180;
  font-size:22px;
  animation:star-pop .8s cubic-bezier(.36,.07,.19,.97) forwards;
}
@keyframes star-pop{
  0%{opacity:1;transform:scale(.3)}
  60%{opacity:1;transform:scale(1.3) translate(var(--sx),var(--sy))}
  100%{opacity:0;transform:scale(.8) translate(var(--sx2),var(--sy2))}
}
.section-label{
  width:100%;max-width:440px;
  padding:24px 20px 10px;
  font-size:11px;letter-spacing:.12em;color:var(--muted);
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.mission-list{
  width:100%;max-width:440px;
  padding:0 14px;
  display:flex;flex-direction:column;gap:9px;
}
.mission-card{
  display:flex;align-items:center;gap:13px;
  padding:14px 16px;
  background:var(--surface);
  border:1.5px solid rgba(255,255,255,.05);
  border-radius:16px;
  cursor:pointer;
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;user-select:none;
}
.mission-card:active{transform:scale(.98)}
.mission-card.done{
  background:rgba(254,95,60,.08);
  border-color:rgba(254,95,60,.3);
}
.check-circle{
  width:30px;height:30px;border-radius:50%;
  border:2px solid rgba(255,255,255,.13);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  font-size:0;position:relative;z-index:1;
}
.mission-card.done .check-circle{
  border-color:var(--fire);background:var(--fire);
  font-size:15px;transform:scale(1.1);
}
.mission-body{flex:1;position:relative;z-index:1}
.mission-num{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:2px}
.mission-title{font-size:14px;font-weight:700;line-height:1.3;transition:color .3s}
.mission-card.done .mission-title{
  color:var(--fire);text-decoration:line-through;
  text-decoration-color:rgba(254,95,60,.4);
}
.mission-hint{font-size:11px;color:var(--muted);margin-top:3px}
.log-badge{
  width:32px;height:13px;border-radius:6px;
  background:var(--surface2);border-bottom:2.5px solid var(--logd);
  flex-shrink:0;opacity:.2;transition:all .4s;
  position:relative;z-index:1;
}
.mission-card.done .log-badge{background:var(--log);border-color:var(--logd);opacity:1}
.bottom{
  width:100%;max-width:440px;
  padding:24px 20px 0;
  display:flex;flex-direction:column;gap:12px;align-items:center;
}
.prog-wrap{
  width:100%;height:6px;background:rgba(255,255,255,.07);
  border-radius:6px;overflow:hidden;
}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--fire),var(--fire2));
  border-radius:6px;width:0%;
  transition:width .6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(254,95,60,.5);
}
.prog-label{font-size:12px;color:var(--muted);align-self:flex-end;margin-top:-6px}
.prog-label span{color:var(--fire);font-weight:700}
.action-btn{
  width:100%;padding:18px;border-radius:16px;border:none;
  font-family:'Noto Sans KR',sans-serif;
  font-size:16px;font-weight:900;letter-spacing:.04em;
  cursor:pointer;transition:all .3s;
}
.action-btn:disabled{
  background:var(--surface);
  border:1.5px solid rgba(255,255,255,.07);
  color:var(--muted);cursor:not-allowed;
}
.action-btn:not(:disabled){
  background:linear-gradient(135deg,var(--fire),#FF7A20);
  color:#fff;
  box-shadow:0 6px 28px rgba(254,95,60,.45);
  animation:btn-pulse 2s ease-in-out infinite;
}
@keyframes btn-pulse{
  0%,100%{box-shadow:0 6px 28px rgba(254,95,60,.45)}
  50%{box-shadow:0 6px 40px rgba(254,95,60,.7)}
}
.action-btn:not(:disabled):active{transform:scale(.97)}
/* 완료 알림 배너 */
.complete-banner{
  display:none;
  position:fixed;top:0;left:0;right:0;z-index:250;
  background:linear-gradient(135deg,#22C55E,#16A34A);
  color:#fff;font-family:'Noto Sans KR',sans-serif;
  padding:14px 20px 16px;
  animation:banner-in .5s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 24px rgba(34,197,94,.5);
}
.complete-banner.show{display:block}
@keyframes banner-in{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.banner-title{font-size:16px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.banner-list{display:flex;flex-direction:column;gap:3px}
.banner-item{font-size:13px;display:flex;align-items:center;gap:6px;opacity:.9}
.banner-item::before{content:'✓';font-weight:900;font-size:12px}
.banner-close{position:absolute;top:12px;right:16px;font-size:20px;cursor:pointer;opacity:.8;background:none;border:none;color:#fff}
.overlay{
  position:fixed;inset:0;
  background:rgba(14,10,8,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:300;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
.overlay.show{opacity:1;pointer-events:all}
.overlay-icon{font-size:80px;animation:big-dance 1s ease-in-out infinite alternate}
@keyframes big-dance{
  from{transform:scale(1) rotate(-3deg)}
  to{transform:scale(1.1) rotate(3deg)}
}
.overlay-title{
  font-size:28px;font-weight:900;
  color:var(--fire);text-align:center;
}
.overlay-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.8}
.overlay-close{
  margin-top:8px;padding:12px 32px;
  border-radius:40px;border:1.5px solid var(--fire);
  background:transparent;color:var(--fire);
  font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
.overlay-close:hover{background:var(--fire);color:#fff}
.confetti-piece{
  position:fixed;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:310;
  animation:conf-fall 2s ease-in forwards;
}
@keyframes conf-fall{
  0%{opacity:1;transform:translate(0,0) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(720deg)}
}

/* ── GREETING OVERLAY ── */
.greet-overlay{
  position:fixed;inset:0;
  background:rgba(14,10,8,.92);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;z-index:400;
  opacity:0;pointer-events:none;
  transition:opacity .4s;
}
.greet-overlay.show{opacity:1;pointer-events:all}

.greet-char-wrap{
  position:relative;
  width:200px;height:230px;
  display:flex;align-items:flex-end;justify-content:center;
}
.greet-fire{
  transform:scale(0.6);transform-origin:bottom center;
  animation:greet-bounce 1.6s ease-in-out infinite;
}
@keyframes greet-bounce{
  0%,100%{transform:scale(.6) translateY(0) rotate(0deg)}
  25%{transform:scale(.6) translateY(-12px) rotate(-2deg)}
  50%{transform:scale(.6) translateY(-6px) rotate(1deg)}
  75%{transform:scale(.6) translateY(-14px) rotate(-1deg)}
}

/* Speech bubble */
.speech-bubble{
  position:absolute;
  top:-10px;right:-30px;
  background:#fff;
  border-radius:18px 18px 18px 4px;
  padding:14px 18px;
  min-width:200px;max-width:240px;
  box-shadow:0 4px 24px rgba(0,0,0,.3);
  opacity:0;
  transform:scale(.7) translateY(8px);
  transform-origin:bottom left;
  transition:opacity .4s .3s, transform .4s .3s cubic-bezier(.34,1.56,.64,1);
}
.greet-overlay.show .speech-bubble{
  opacity:1;transform:scale(1) translateY(0);
}
.speech-bubble::before{
  content:'';
  position:absolute;bottom:-10px;left:12px;
  border:6px solid transparent;
  border-top-color:#fff;border-bottom:none;
}
.bubble-name{
  font-size:11px;font-weight:900;color:var(--fire);
  letter-spacing:.08em;margin-bottom:6px;
}
.bubble-text{
  font-size:14px;font-weight:700;
  color:#1A0E08;line-height:1.6;
}
.bubble-text .hi{font-size:18px}
.bubble-cursor{
  display:inline-block;width:2px;height:14px;
  background:var(--fire);border-radius:1px;
  animation:cursor-blink .6s ease-in-out infinite;
  vertical-align:middle;margin-left:2px;
}
@keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}

.greet-tap-hint{
  margin-top:32px;
  font-size:12px;color:rgba(255,255,255,.3);
  letter-spacing:.06em;
  animation:hint-pulse 2s ease-in-out infinite;
}
@keyframes hint-pulse{0%,100%{opacity:.3}50%{opacity:.7}}

.greet-btn{
  margin-top:20px;
  padding:14px 44px;
  border-radius:40px;
  border:1.5px solid var(--fire);
  background:transparent;color:var(--fire);
  font-family:'Noto Sans KR',sans-serif;
  font-size:15px;font-weight:900;
  cursor:pointer;letter-spacing:.06em;
  transition:all .25s;
  opacity:0;pointer-events:none;
  transform:translateY(8px);
  transition:opacity .4s,transform .4s,background .2s,color .2s;
}
.greet-btn.visible{opacity:1;pointer-events:all;transform:translateY(0)}
.greet-btn:hover{background:var(--fire);color:#fff}

/* ── GREETING OVERLAY ── */
.greet-overlay{
  position:fixed;inset:0;
  background:rgba(14,10,8,.97);
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:10vh;
  z-index:400;
  opacity:0;pointer-events:none;
  transition:opacity .4s;
}
.greet-overlay.show{opacity:1;pointer-events:all}

/* bubble sits at top, character below */
.greet-layout{
  display:flex;flex-direction:column;
  align-items:center;gap:0;
  width:100%;max-width:360px;
}

/* Speech bubble */
.speech-bubble{
  position:relative;
  background:#fff;
  border-radius:20px;
  padding:20px 24px 18px;
  width:280px;
  box-shadow:0 8px 36px rgba(0,0,0,.45);
  opacity:0;
  transform:translateY(12px) scale(.92);
  transition:opacity .45s .4s,transform .45s .4s cubic-bezier(.34,1.56,.64,1);
  margin-bottom:0;
}
.greet-overlay.show .speech-bubble{opacity:1;transform:translateY(0) scale(1)}
/* tail pointing DOWN toward character */
.speech-bubble::after{
  content:"";
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:15px solid #fff;
}
.bubble-name{font-size:11px;font-weight:900;color:#FE5F3C;letter-spacing:.12em;margin-bottom:8px}
.bubble-text{font-size:15px;font-weight:700;color:#1A0E08;line-height:1.75;min-height:54px}
.bubble-cursor{
  display:inline-block;width:2px;height:15px;
  background:#FE5F3C;border-radius:1px;
  animation:cur-blink .55s ease-in-out infinite;
  vertical-align:middle;margin-left:2px;
}
@keyframes cur-blink{0%,100%{opacity:1}50%{opacity:0}}

/* Fire character */
.greet-char-wrap{
  width:160px;height:140px;
  display:flex;align-items:flex-end;justify-content:center;
  flex-shrink:0;
}
.greet-fire{
  transform:scale(.52);transform-origin:bottom center;
  animation:greet-bounce 1.8s ease-in-out infinite;
}
@keyframes greet-bounce{
  0%,100%{transform:scale(.52) translateY(0) rotate(0deg)}
  30%{transform:scale(.52) translateY(-14px) rotate(-2deg)}
  60%{transform:scale(.52) translateY(-8px) rotate(1.5deg)}
  80%{transform:scale(.52) translateY(-16px) rotate(-1deg)}
}

.greet-btn{
  margin-top:32px;
  padding:16px 52px;border-radius:40px;
  border:2px solid #FE5F3C;
  background:transparent;color:#FE5F3C;
  font-family:"Noto Sans KR",sans-serif;
  font-size:16px;font-weight:900;letter-spacing:.06em;
  cursor:pointer;
  opacity:0;pointer-events:none;
  transform:translateY(10px);
  transition:opacity .4s,transform .4s,background .2s,color .2s;
}
.greet-btn.visible{opacity:1;pointer-events:all;transform:translateY(0)}
.greet-btn:hover{background:#FE5F3C;color:#fff}
</style>

<body>

<div class="header">
  <div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:3px">오늘의 미션</div>
    <div class="student-name"><span id="header-name">--</span> <span>학생</span> 🔥 <span id="class-badge" style="display:none;font-size:12px;font-weight:700;background:rgba(59,130,246,.15);color:#3B82F6;border-radius:20px;padding:2px 10px;vertical-align:middle;margin-left:4px"></span></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="date-badge" id="today-date"></div>
    <div class="sync-badge" id="sync-badge">✦ 업데이트됨</div>
  </div>
</div>

<div class="stage">
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:8px;">
  <div class="status-bubble" id="status-bubble" style="margin-bottom:0;flex:1;">미션을 완료하면 장작을 먹어요!</div>
  <div id="points-display" style="font-size:13px;font-weight:700;color:#FE5F3C;background:rgba(254,95,60,.12);border:1px solid rgba(254,95,60,.3);border-radius:20px;padding:6px 14px;white-space:nowrap;margin-left:10px;">🏅 -- 포인트</div>
</div>

  <div class="canvas-wrap" id="canvas-wrap">
    <div class="ground-glow" id="ground-glow"></div>
    <div class="log-pile">
      <div class="log-stick log-a" id="log-a"></div>
      <div class="log-stick log-b" id="log-b"></div>
      <div class="log-stick log-c" id="log-c"></div>
    </div>

    <!-- FIRE CHARACTER -->
    <div class="fire-char dim" id="fire-char">
      <svg width="180" height="240" viewBox="0 0 180 240" style="overflow:visible">
        <g class="char-body">
          <!-- tip flames -->
          <ellipse class="tip fm" cx="90" cy="38" rx="9" ry="18" fill="#FE5F3C" opacity=".65"/>
          <ellipse class="tip fm" cx="68" cy="50" rx="7" ry="13" fill="#FF7A3C" opacity=".5"/>
          <ellipse class="tip fm" cx="112" cy="50" rx="7" ry="13" fill="#FF6A3C" opacity=".45"/>
          <!-- body -->
          <path class="fm" fill="#FE5F3C" d="M90,22 C58,22 28,58 28,102 C28,148 56,178 90,180 C124,178 152,148 152,102 C152,58 122,22 90,22Z"/>
          <!-- mid -->
          <path class="fmid" fill="#FF9A2E" d="M90,52 C72,52 50,78 50,110 C50,140 68,164 90,166 C112,164 130,140 130,110 C130,78 108,52 90,52Z"/>
          <!-- core -->
          <ellipse class="fcore" cx="90" cy="120" rx="27" ry="33" fill="#FFD060"/>
          <!-- eyes -->
          <ellipse class="ew" cx="71" cy="101" rx="14" ry="16" fill="#fff"/>

<script>
// 어드민에서 설정한 미션을 키오스크 API에서 불러오기
let missions = [];
let done = [];

function getTodayKey() {
  const d = new Date();
  return 'mogakgong_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
}
function getMissionKey() {
  return STUDENT_KEY;
}
function getDoneStoreKey() {
  const d = new Date();
  return 'mogakgong_done_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
}
function getSubmitKey() {
  // 오늘 제출 완료 여부 저장 키
  const d = new Date();
  return 'mogak_submitted_' + STUDENT_KEY + '_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
}
function isSubmittedToday() {
  return localStorage.getItem(getSubmitKey()) === '1';
}
function markSubmittedToday() {
  localStorage.setItem(getSubmitKey(), '1');
}

// ── done 상태: localStorage(즉시) + 서버(공유) 이중 저장 ─────────────────────
function getLocalDoneKey() {
  return 'mogak_done_' + STUDENT_KEY + '_' + getDoneStoreKey();
}

async function saveDoneState() {
  const doneArr = done.map(Boolean);

  // localStorage 즉시 저장 (새로고침 대비)
  try { localStorage.setItem(getLocalDoneKey(), JSON.stringify(doneArr)); } catch(_) {}

  // 서버 저장 (기기 간 공유)
  try {
    await fetch(KIOSK_API + '/api/mogak/done', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        dateKey: getDoneStoreKey(),
        studentKey: STUDENT_KEY,
        done: doneArr
      })
    });
  } catch(e) {}
}

async function loadDoneState(cfg) {
  // 1순위: 서버 데이터 (공유 상태)
  try {
    if (cfg) {
      const saved = cfg[getDoneStoreKey()]?.[STUDENT_KEY];
      if (saved && Array.isArray(saved) && saved.some(Boolean)) {
        done = missions.map((_, i) => saved[i] || false);
        try { localStorage.setItem(getLocalDoneKey(), JSON.stringify(done)); } catch(_) {}
        return true;
      }
    }
  } catch(e) {}

  // 2순위: localStorage (서버에 없을 때)
  try {
    const local = localStorage.getItem(getLocalDoneKey());
    if (local) {
      const parsed = JSON.parse(local);
      if (Array.isArray(parsed) && parsed.some(Boolean)) {
        done = missions.map((_, i) => parsed[i] || false);
        saveDoneState(); // 로컬 → 서버 업로드
        return true;
      }
    }
  } catch(_) {}

  return false;
}

// 미션은 서버에서만 로드

let _lastMissionHash = '';

function missionHash(ms) {
  return JSON.stringify(ms);
}

async function loadMissions(silent) {
  try {
    const res = await fetch(KIOSK_API + '/api/config');
    const cfg = await res.json();
    // 별명 로드 (첫 번째 로드 시에만)
    if (!STUDENT_NICKNAME) {
      const nicknames = cfg.mogak_nicknames || {};
      STUDENT_NICKNAME = nicknames[STUDENT_KEY] || '';
    }
    const todayKey = getTodayKey();
    const loaded = cfg[todayKey]?.[getMissionKey()];
    const newMs = (loaded && loaded.length > 0) ? loaded : [];

    if (silent) {
      // 폴링 모드 — 미션 변경 또는 done 상태 변경 감지
      const newHash = missionHash(newMs);
      const doneFromServer = cfg[getDoneStoreKey()]?.[STUDENT_KEY];
      const newDoneHash = JSON.stringify(doneFromServer || []);
      const prevDoneHash = JSON.stringify(done);

      if (newHash === _lastMissionHash && newDoneHash === prevDoneHash) return;

      _lastMissionHash = newHash;
      missions = newMs;
      // 서버 done 상태 우선, 없으면 현재 유지
      if (doneFromServer && Array.isArray(doneFromServer)) {
        done = missions.map((_, i) => doneFromServer[i] || false);
      } else {
        done = missions.map((_, i) => done[i] || false);
      }
      document.getElementById('total-count').textContent = missions.length;
      buildMissionList();
      done.forEach((d,i) => { if(d) applyDone(i); });
      updateState();
      showSyncBadge();
      return;
    }

    missions = newMs;
    _lastMissionHash = missionHash(missions);
  } catch(e) {
    if (!silent) missions = [];
  }
  if (!silent) {
    document.getElementById('total-count').textContent = missions.length;
    // done 상태 로드 (cfg 재사용 — 추가 fetch 불필요)
    const hasSaved = await loadDoneState(cfg);
    if (!hasSaved) done = new Array(missions.length).fill(false);
    buildMissionList();
    done.forEach((d,i) => { if(d) applyDone(i); });
    updateState();
  }
}

function showCompleteBanner() {
  const banner = document.getElementById('complete-banner');
  const list = document.getElementById('banner-list');
  if (!banner || !list) return;
  // 완료된 미션 목록
  const completed = missions.filter((_, i) => done[i]);
  list.innerHTML = completed.map(m =>
    `<div class="banner-item">${m.text}</div>`
  ).join('');
  banner.classList.add('show');
}

function showSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// 30초마다 실시간 업데이트 폴링
function startPolling() {
  setInterval(() => {
    if (document.visibilityState !== 'hidden') {
      loadMissions(true);
    }
  }, 30000);
}

const d=new Date();
document.getElementById('today-date').textContent=`${d.getMonth()+1}월 ${d.getDate()}일`;
// total-count는 loadMissions()에서 설정

function applyDone(i) {
  const card = document.getElementById('card-'+i);
  const chk = document.getElementById('chk-'+i);
  if (card) card.classList.add('done');
  if (chk) chk.textContent = '✓';
}

function buildMissionList() {
const list=document.getElementById('mission-list');
list.innerHTML = '';
missions.forEach((m,i)=>{
  const c=document.createElement('div');
  c.className='mission-card';c.id=`card-${i}`;
  c.innerHTML=`<div class="check-circle" id="chk-${i}"></div>
    <div class="mission-body">
      <div class="mission-num">MISSION ${String(i+1).padStart(2,'0')}</div>
      <div class="mission-title">${m.text}</div>
      <div class="mission-hint">${m.hint}</div>
    </div><div class="log-badge"></div>`;
  c.addEventListener('click',()=>toggle(i));
  list.appendChild(c);
});
} // end buildMissionList

function toggle(i){
  const was=done[i];done[i]=!done[i];
  const card=document.getElementById(`card-${i}`);
  document.getElementById(`chk-${i}`).textContent=done[i]?'✓':'';
  card.classList.toggle('done',done[i]);
  if(done[i]&&!was) flyLog(card);
  updateState();
  saveDoneState(); // 서버에 체크 상태 저장
}

function flyLog(card){
  const el=document.getElementById('fly-log');
  const cR=card.getBoundingClientRect();
  const fR=document.getElementById('fire-char').getBoundingClientRect();
  const sx=cR.right-50, sy=cR.top+cR.height/2-8;
  const ex=fR.left+fR.width/2-22, ey=fR.top+fR.height*.55;
  el.style.cssText=`left:${sx}px;top:${sy}px;opacity:1;display:block;transition:none`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.transition='left .55s cubic-bezier(.4,0,.2,1),top .55s cubic-bezier(.4,0,.2,1),opacity .15s .45s,transform .55s';
    el.style.left=ex+'px';el.style.top=ey+'px';
    el.style.opacity='0';el.style.transform='rotate(-20deg) scale(.6)';
    setTimeout(()=>{
      el.style.display='none';el.style.transform='';
      eatEffect();spawnParticles();spawnStars(ex+22,ey+8);
    },580);
  }));
}

function eatEffect(){
  const c=document.getElementById('fire-char');
  c.classList.add('eating');
  setTimeout(()=>c.classList.remove('eating'),600);
}

function spawnParticles(){
  const wrap=document.getElementById('canvas-wrap');
  const wR=wrap.getBoundingClientRect();
  const cols=['#FE5F3C','#FF9A2E','#FFD060','#FF6644'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='particle';
    const dx=(Math.random()-.5)*120,dy=-40-Math.random()*60;
    p.style.cssText=`width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      left:${wR.width/2+dx*.3}px;top:${wR.height*.55}px;
      --dx:${dx}px;--dy:${dy}px;
      animation-duration:${.8+Math.random()*.6}s;animation-delay:${Math.random()*.1}s`;
    wrap.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
}

function spawnStars(cx,cy){
  ['⭐','✨','🔥','💥'].slice(0,3).forEach((e,i)=>{
    const s=document.createElement('div');s.className='star-burst';
    const sx=(Math.random()-.5)*80,sy=-20-Math.random()*40;
    s.textContent=e;
    s.style.cssText=`left:${cx}px;top:${cy}px;--sx:${sx}px;--sy:${sy}px;--sx2:${sx*1.2}px;--sy2:${sy*1.4-20}px;animation-delay:${i*.1}s`;
    document.body.appendChild(s);setTimeout(()=>s.remove(),1200);
  });
}

function spawnConfetti(){
  const cols=['#FE5F3C','#FF9A2E','#FFD060','#FF6644','#FFA040'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');c.className='confetti-piece';
    const cx=(Math.random()-.5)*window.innerWidth*2,cy=window.innerHeight+100;
    c.style.cssText=`background:${cols[Math.floor(Math.random()*cols.length)]};
      left:${window.innerWidth/2}px;top:${window.innerHeight*.3}px;
      --cx:${cx}px;--cy:${cy}px;
      animation-duration:${1.5+Math.random()}s;animation-delay:${Math.random()*.4}s;
      border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000);
  }
}

const MSGS=[
  '미션을 완료하면 장작을 먹어요! 🪵',
  '냠냠! 장작을 먹었어요! 조금 살아났어요 🔥',
  '배가 차오르고 있어요! 더 줘요! 🔥🔥',
  '불꽃이 강해지고 있어요! 멋져요! 🔥🔥🔥',
  '거의 다 왔어요! 마지막 장작까지! 💪',
  '활활 타오르는 모닥불 완성! 야호! 🎉',
];
const LEVELS=['','level-1','level-2','level-3','level-4','level-5'];

function updateState(){
  const cnt=done.filter(Boolean).length,total=missions.length,r=cnt/total;
  document.getElementById('prog-fill').style.width=(r*100)+'%';
  document.getElementById('done-count').textContent=cnt;
  const bubble=document.getElementById('status-bubble');
  bubble.textContent=MSGS[cnt];bubble.classList.toggle('alive',cnt>0);
  const char=document.getElementById('fire-char');
  char.className='fire-char '+LEVELS[cnt];
  if(cnt===0)char.classList.add('dim');
  const glow=document.getElementById('ground-glow');
  glow.style.opacity=cnt===0?.03:(.08+r*.35);
  glow.style.width=(80+r*120)+'px';
  const la=document.getElementById('log-a'),lb=document.getElementById('log-b'),lc=document.getElementById('log-c');
  la.classList.toggle('show',cnt>=1);lb.classList.toggle('show',cnt>=3);lc.classList.toggle('show',cnt>=5);
  const btn=document.getElementById('action-btn');
  if(cnt===total && total>0){
    showCompleteBanner();
  } else {
    document.getElementById('complete-banner')?.classList.remove('show');
  }
  if(cnt===total){
    if(isSubmittedToday()){
      // 이미 제출 완료 — 재제출 불가
      btn.disabled=true;
      btn.textContent='✅ 오늘 이미 완료 알림을 보냈어요!';
      btn.onclick=null;
    } else {
      btn.disabled=false;btn.textContent='선생님께 완료 알림 보내기 🔥';
      btn.onclick=async()=>{
        if(isSubmittedToday()) return;
        btn.disabled=true;
        btn.textContent='선생님께 전송 중... ⏳';
        const completed = missions.filter((_,i)=>done[i]);
        // 포인트 즉시 지급 X → 선생님 확인 대기 상태로 저장
        const ok = await requestTeacherConfirm(completed);
        markSubmittedToday();
        btn.textContent='✅ 선생님 확인 대기 중...';
        spawnConfetti();
        document.getElementById('overlay-points').textContent =
          ok ? '⏳ 선생님이 확인하면 포인트가 적립돼요!'
             : '⚠️ 전송 실패 — 선생님께 말씀해주세요';
        setTimeout(()=>document.getElementById('overlay').classList.add('show'),400);
      };
    }
  } else {
    btn.disabled=true;btn.textContent=`미션이 ${total-cnt}개 남았어요 🪵`;btn.onclick=null;
  }
}

// idle blink
function blink(){
  document.querySelectorAll('.ew').forEach(e=>e.setAttribute('ry','2'));
  setTimeout(()=>document.querySelectorAll('.ew').forEach(e=>e.removeAttribute('ry')),120);
}
setInterval(blink,3000+Math.random()*2000);

// ─── GREETING ──────────────────────────────
// ── 키오스크 연동 설정 ─────────────────────────────────────
const KIOSK_API = 'https://bakuum-kiosk.pages.dev';
const PT_PER_MISSION = 2;   // 미션 1개당 포인트
const PT_BONUS_ALL   = 10;  // 전체 완료 보너스

// URL 파라미터에서 학생 이름 읽기 (?name=민서준)
const urlParams = new URLSearchParams(window.location.search);
const STUDENT_NAME = urlParams.get('name') || '지현';
const STUDENT_CLASS = urlParams.get('class') || ''; // 수학 | 영어 | ''
const STUDENT_KEY = STUDENT_NAME + (STUDENT_CLASS ? '_' + STUDENT_CLASS : '');

// 별명 (config에서 로드, 없으면 성 제거한 이름)
let STUDENT_NICKNAME = '';

function getDefaultNickname(name) {
  // 3글자 이상이면 첫 글자(성) 제거, 2글자 이하면 그대로
  return name.length >= 3 ? name.slice(1) : name;
}

function getCallName() {
  return STUDENT_NICKNAME || getDefaultNickname(STUDENT_NAME);
}

// 헤더 이름 즉시 반영
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('header-name');
  if (el) el.textContent = STUDENT_NAME;
  // 과목 배지 표시
  if (STUDENT_CLASS) {
    const badge = document.getElementById('class-badge');
    if (badge) { badge.textContent = STUDENT_CLASS; badge.style.display = 'inline-block'; }
  }
});

// 키오스크 학생 데이터 (API에서 로드)
let kioskStudent = null;

// 학생 정보 로드
async function loadKioskStudent() {
  try {
    const res = await fetch(KIOSK_API + '/api/students');
    const data = await res.json();
    if (data.success) {
      kioskStudent = data.students.find(s => s.name === STUDENT_NAME) || null;
      if (kioskStudent) updatePointsDisplay(kioskStudent.points);
    }
  } catch(e) { console.log('키오스크 연결 실패:', e); }
}

// 포인트 UI 업데이트
function updatePointsDisplay(pts) {
  const el = document.getElementById('points-display');
  if (el) el.textContent = '🏅 ' + pts + ' 포인트';
}

// 키오스크에 미션 완료 제출
// 선생님 확인 대기 상태로 저장 (포인트 미적립)
async function requestTeacherConfirm(completedMissions) {
  try {
    const res = await fetch(KIOSK_API + '/api/mogak/done', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        dateKey: 'mogakgong_pending',
        studentKey: STUDENT_KEY,
        done: {
          name: STUDENT_NAME,
          cat: STUDENT_CLASS,
          missions: completedMissions,
          timestamp: Date.now(),
          status: 'pending'
        }
      })
    });
    return res.ok;
  } catch(e) { return false; }
}

async function submitToKiosk(completedMissions) {
  // 영어반은 키오스크 포인트 연동 안 함
  if (STUDENT_CLASS === '영어') return { success: true, noKiosk: true };
  if (!kioskStudent) return { success: false, reason: '학생 정보 없음' };
  const totalPts = completedMissions.length * PT_PER_MISSION + PT_BONUS_ALL;
  const items = completedMissions.map(m => ({
    icon: '✅', label: '미션: ' + m.text, qty: 1, tab: 'learn', comment: ''
  }));
  items.push({ icon: '🎉', label: '전체 완료 보너스', qty: 1, tab: 'learn', comment: '' });
  const ts = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
  try {
    const res = await fetch(KIOSK_API + '/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: STUDENT_NAME,
        items,
        totalCost: -totalPts,
        currency: '포인트',
        category: 'learn',
        timestamp: ts,
        photoBase64: null,
        comment: '모각공 오늘의 미션 완료 (' + completedMissions.length + '개)'
      })
    });
    const d = await res.json();
    if (d.success && kioskStudent) {
      kioskStudent.points += totalPts;
      updatePointsDisplay(kioskStudent.points);
    }
    return { success: d.success, points: totalPts };
  } catch(e) {
    return { success: false, reason: e.message };
  }
}

const gDate = new Date();
const MONTH = gDate.getMonth() + 1;
const DAY   = gDate.getDate();

const todayKey = 'modak_visited_' + STUDENT_KEY + '_' + gDate.getFullYear() + '_' + MONTH + '_' + DAY;
const isFirstToday = !localStorage.getItem(todayKey);

function getGreetLines() {
  return isFirstToday
    ? [
        '오늘은 ' + MONTH + '월 ' + DAY + '일',
        '안녕, ' + getCallName() + '!',
        '나는 모닥이야',
        '오늘도 나를 빛나게 해줘! ✨',
      ]
    : [
        '오늘은 ' + MONTH + '월 ' + DAY + '일',
        '안녕, ' + getCallName() + '!',
        '오늘도 나를 빛나게 해줘! ✨',
      ];
}

function typeGreeting(){
  const btn = document.getElementById('greet-btn');
  // 안전장치: 4초 후에도 버튼 안 나타나면 강제로 표시
  const safetyTimer = setTimeout(()=>{
    if(btn && !btn.classList.contains('visible')) btn.classList.add('visible');
  }, 4000);

  try {
    const el  = document.getElementById('bubble-typed');
    const cur = document.getElementById('bcursor');
    if(!el || !btn){ clearTimeout(safetyTimer); if(btn) btn.classList.add('visible'); return; }

    const GREET_LINES = getGreetLines();
    if(!GREET_LINES || !GREET_LINES.length){
      clearTimeout(safetyTimer);
      btn.classList.add('visible');
      return;
    }

    let lineIdx = 0, charIdx = 0;
    let rendered = [];

    function tick(){
      try {
        if(lineIdx >= GREET_LINES.length){
          clearTimeout(safetyTimer);
          if(cur) cur.style.display = 'none';
          btn.classList.add('visible');
          return;
        }
        const line = GREET_LINES[lineIdx] || '';
        if(charIdx < line.length){
          if(rendered.length <= lineIdx) rendered.push('');
          rendered[lineIdx] += line[charIdx];
          el.innerHTML = rendered.map((l,i)=> i < rendered.length-1 ? l + '<br>' : l).join('');
          charIdx++;
          setTimeout(tick, 55);
        } else {
          lineIdx++; charIdx = 0;
          setTimeout(tick, lineIdx < GREET_LINES.length ? 350 : 180);
        }
      } catch(e) {
        clearTimeout(safetyTimer);
        if(btn) btn.classList.add('visible');
      }
    }
    setTimeout(tick, 500);
  } catch(e) {
    clearTimeout(safetyTimer);
    if(btn) btn.classList.add('visible');
  }
}

function closeGreet(){
  localStorage.setItem(todayKey, '1');
  const ov = document.getElementById('greet-overlay');
  if(!ov) return;
  ov.style.opacity = '0';
  ov.style.pointerEvents = 'none';
  setTimeout(()=>{ ov.style.display = 'none'; }, 420);
}

// 오버레이 어디 탭해도 닫히게 — 버튼 나온 후 or 2초 후
let _greetStart = Date.now();
document.getElementById('greet-overlay').addEventListener('click', ()=>{
  const btn = document.getElementById('greet-btn');
  const elapsed = Date.now() - _greetStart;
  // 버튼 보이거나, 1.5초 이상 지났으면 닫기
  if((btn && btn.classList.contains('visible')) || elapsed > 1500) closeGreet();
});

window.addEventListener('load', async ()=>{
  document.getElementById('greet-overlay').classList.add('show');
  // 인사말 & 미션 로드 병렬 시작 (인사말이 미션 로드를 기다리지 않음)
  const missionLoad = loadMissions(false);
  typeGreeting();                      // 즉시 시작
  await missionLoad;                   // 미션은 백그라운드에서 로드
  startPolling();
  loadKioskStudent();
});
</script>
