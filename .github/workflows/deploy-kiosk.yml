name: 키오스크 자동 배포

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Cloudflare Pages 배포
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: 빌드
        run: npm run build

      - name: Cloudflare Pages 배포
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name bakuum-kiosk --commit-dirty=true
